<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RPC Operating Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wm: {
              blue:    '#0053e2',
              bluehov: '#003db5',
              spark:   '#ffc220',
              red:     '#ea1100',
              green:   '#2a8703',
              warn:    '#995213',
              warnbg:  '#fff8e7',
              gray10:  '#f5f5f5',
              gray50:  '#c8c8c8',
              gray100: '#767676',
              gray160: '#1a1a1a',
            }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator  { opacity: 1; }

    /* Status color helpers */
    .status-pending     { @apply bg-gray-100 text-gray-600; }
    .status-in-progress { @apply bg-blue-100 text-blue-700; }
    .status-done        { @apply bg-green-100 text-green-700; }
    .status-skipped     { @apply bg-gray-200 text-gray-500; }

    /* Nudge levels */
    .nudge-info     { @apply bg-blue-50 border-blue-400 text-blue-800; }
    .nudge-success  { @apply bg-green-50 border-green-400 text-green-800; }
    .nudge-warning  { @apply bg-yellow-50 border-yellow-400 text-yellow-800; }
    .nudge-critical { @apply bg-red-50 border-red-500 text-red-800; }

    /* Card hover */
    .block-card { transition: box-shadow 0.15s ease; }
    .block-card:hover { box-shadow: 0 4px 16px rgba(0,83,226,0.10); }

    /* Slim scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f5f5f5; }
    ::-webkit-scrollbar-thumb { background: #c8c8c8; border-radius: 4px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-wm-gray10 text-wm-gray160 min-h-screen font-sans">

  <!-- Top navigation bar -->
  <nav class="bg-wm-blue text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-wm-spark font-black text-xl tracking-tight">⚡ RPC OPS</span>
        <span class="hidden sm:block text-blue-200 text-sm">Daily Operating Dashboard</span>
      </div>
      <div class="flex items-center gap-3 text-sm flex-wrap">
        <a href="/weekly" class="text-blue-200 hover:text-white transition">📅 Weekly</a>

        <!-- Persistent publish status + controls (single anchor, loaded once) -->
        <div id="pub-area"
             hx-get="/publish/status"
             hx-trigger="load"
             hx-target="#pub-area"
             hx-swap="outerHTML"
             class="flex items-center gap-2">
          <span class="text-xs text-blue-200">checking…</span>
        </div>

        <!-- Publish button (always visible, replaces #pub-area with fresh status) -->
        <button hx-post="/publish/now"
                hx-target="#pub-area"
                hx-swap="outerHTML"
                hx-indicator="#pub-spinner"
                class="flex items-center gap-1.5 bg-wm-spark text-gray-900 font-semibold
                       text-xs px-3 py-1.5 rounded-lg hover:bg-yellow-300 transition"
                title="Publish current dashboard state to the persistent share link">
          <span id="pub-spinner" class="htmx-indicator">⏳</span>
          📤 Publish
        </button>

        <a href="/publish/export"
           class="text-xs text-blue-200 hover:text-white transition"
           title="Download HTML snapshot">
          ⬇ Export
        </a>

        <span id="live-clock" class="text-blue-100 font-mono text-xs"></span>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <script src="/static/app.js"></script>
</body>
</html>
