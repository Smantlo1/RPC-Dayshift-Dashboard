<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPC Daily Operating Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .tab-active   { border-bottom:3px solid #0053e2; color:#0053e2; font-weight:700; }
  .tab-inactive { border-bottom:3px solid transparent; color:#6b7280; }
  .tab-inactive:hover { color:#0053e2; }
  .nudge-info     { background:#eff6ff; border-left:4px solid #3b82f6; }
  .nudge-warning  { background:#fffbeb; border-left:4px solid #f59e0b; }
  .nudge-critical { background:#fef2f2; border-left:4px solid #ef4444; }
  .nudge-success  { background:#f0fdf4; border-left:4px solid #22c55e; }
  .modal-bg { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;
    display:flex;align-items:center;justify-content:center;padding:16px; }
  .modal-box { background:white;border-radius:16px;width:100%;max-width:480px;
    max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3); }
  details>summary { cursor:pointer;list-style:none; }
  details>summary::-webkit-details-marker { display:none; }
  .tip { position:relative;display:inline-block; }
  .tip .tip-text { visibility:hidden;opacity:0;transition:opacity .15s;
    position:absolute;z-index:10;bottom:125%;left:50%;transform:translateX(-50%);
    background:#1f2937;color:white;font-size:11px;border-radius:6px;
    padding:5px 9px;width:220px;line-height:1.4;white-space:normal;pointer-events:none; }
  .tip:hover .tip-text { visibility:visible;opacity:1; }
  .phase-pill { font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:2px 9px;border-radius:999px;display:inline-block; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- HEADER -->
<div class="bg-[#0053e2] text-white px-4 py-3 flex flex-wrap items-center justify-between gap-3 sticky top-0 z-40 shadow-lg">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🏗️</span>
    <div>
      <div class="font-black text-lg leading-none">RPC Daily Operating Dashboard</div>
      <div id="hdr-date" class="text-xs opacity-75 mt-0.5"></div>
    </div>
  </div>
  <div class="flex flex-wrap items-center gap-2">
    <button onclick="prevDay()" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded text-sm">← Prev</button>
    <button onclick="goToday()" class="bg-[#ffc220] text-gray-900 font-bold px-3 py-1.5 rounded text-sm">Today</button>
    <button onclick="nextDay()" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded text-sm">Next →</button>
    <input type="date" id="date-picker" onchange="setDate(this.value)"
      class="bg-white/20 border border-white/30 text-white px-2 py-1 rounded text-sm [color-scheme:dark]">
  </div>
</div>

<!-- PRIORITY BAR -->
<div class="bg-gray-800 text-white text-xs px-4 py-2 flex flex-wrap gap-x-6 gap-y-1">
  <span>📌 <b>Priority 1:</b> Make today's work happen.</span>
  <span>📌 <b>Priority 2:</b> Set tomorrow up to succeed.</span>
  <span>📌 <b>Priority 3:</b> Escalate anything that threatens phasing — immediately.</span>
  <span id="weekly-note-banner" class="text-yellow-300 font-semibold"></span>
</div>

<!-- NUDGES + BADGES -->
<div class="max-w-4xl mx-auto px-4">
  <div id="nudge-bar"     class="pt-3 space-y-2"></div>
  <div id="status-badges" class="pt-2 flex flex-wrap gap-2"></div>
</div>

<!-- TABS -->
<div class="max-w-4xl mx-auto px-4 pt-3">
  <div class="flex border-b border-gray-200 overflow-x-auto">
    <button onclick="setTab('timeline')" id="tab-timeline" class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">🕐 Timeline</button>
    <button onclick="setTab('tasks')"    id="tab-tasks"    class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">📋 Tasks</button>
    <button onclick="setTab('tracking')" id="tab-tracking" class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">📊 Tracking Sheets</button>
    <button onclick="setTab('weekly')"   id="tab-weekly"   class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">📅 Weekly</button>
  </div>
</div>

<!-- TAB CONTENT -->
<div class="max-w-4xl mx-auto px-4 pt-4 pb-20">
  <div id="tab-content-timeline"  class="hidden"></div>
  <div id="tab-content-tasks"     class="hidden"></div>
  <div id="tab-content-tracking"  class="hidden"></div>
  <div id="tab-content-weekly"    class="hidden"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><div id="modal-content"></div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
const KEY = 'rpc_dash_v4';
function load() { try{return JSON.parse(localStorage.getItem(KEY))||{};}catch{return{};} }
function save(d) { localStorage.setItem(KEY,JSON.stringify(d)); }
function getStore() {
  const d=load();
  if(!d.tasks)    d.tasks=[];
  if(!d.projects) d.projects=[];
  if(!d.blocks)   d.blocks={};
  if(!d.sheetUrl) d.sheetUrl='';
  return d;
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function isoToday() { return new Date().toISOString().slice(0,10); }

let state = { date:isoToday(), tab:'timeline' };

// ═══════════════════════════════════════════════════════
//  SCHEDULE DATA  — each block carries full guidance
// ═══════════════════════════════════════════════════════
const DAY_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Phase tags drive the colored pill and flow-awareness text
const PHASES = {

  own:      { label:'Creating accountability',   color:'bg-purple-100 text-purple-800' },
  close:    { label:'Closing the loops',         color:'bg-orange-100 text-orange-700' },

  return {id,time,start,end,label,phase,description,why,tasks,output,...(extra||{})};
}

const BASE_SCHEDULE=[TURNOVER,MEETING,FOLLOWUPS,PLANNING,VALIDATION,

const SCHEDULE = {

      'The weekly plan is locked. Every day this week has a clear purpose and confirmed phasing.'),
    {id:'lunch',time:'11:00 AM – 12:00 PM',start:11,end:12,label:'Lunch',isLunch:true},
    B('expenses','12:00 – 1:00 PM',12,13,'Submit Previous Weeks\' Expenses','admin',

      ['Complete expense reports for all previous weeks','Review for accuracy and submit for approval'],
      'All previous weeks\' expenses are submitted and confirmed.'),
    CLOSEOUT_BLOCK,
  ],

  2: [ // Wednesday
    {...TURNOVER}, {...MEETING},
    B('followups','8:00 – 9:00 AM',8,9,'Send It and Track It','close',
      FOLLOWUPS.description,FOLLOWUPS.why,FOLLOWUPS.tasks,FOLLOWUPS.output),
    B('preentry','9:00 – 10:45 AM',9,10.75,'Pre-Entry and REXPRT Update (Wednesday)','confirm',
      'Begin pre-entry for Thursday\'s JSR submission and update REXPRT so everything is clear, complete, and accessible before the deadline arrives tomorrow.',

      [{text:'Begin pre-entry for JSR',tip:'JSR is due Thursday by 9 AM. Starting today means tomorrow is a calm submit, not a panic.'},

    {...VALIDATION, time:'10:45 AM – 11:00 AM', start:10.75, end:11},

    B('admin_fri','9:00 AM – 2:00 PM',9,14,'Stabilize, Resolve, and Prepare for the Weekend','admin',

       'Confirm the site is stable and controlled'],
      'The site is controlled. Every open issue is resolved or documented. Sunday starts clean.'),
    {id:'lunch',time:'11:00 AM – 12:00 PM',start:11,end:12,label:'Lunch',isLunch:true},
    CLOSEOUT_BLOCK,

const WEEKLY_NOTES={
  Tuesday:  '📅 Planning Lock-In — the weekly plan gets finalized today.',
  Wednesday:'📅 Pre-Entry day — start JSR pre-entry and update REXPRT.',
  Thursday: '⚠️ JSR DUE BY 9:00 AM — submit this before anything else.',
  Friday:   '⚠️ Weekly Summary DUE BY 9:00 AM — send before anything else.',
};

function getBlocks(ds){
  const dow=new Date(ds+'T12:00:00').getDay();
  const key={1:0,2:1,3:2,4:3,5:4}[dow];
  return SCHEDULE[key]!==undefined?SCHEDULE[key]:SCHEDULE.default;
}

const STATUS_OPTS=['pending','in-progress','done','skipped','blocked'];
const STATUS_COLORS={
  done:         'bg-green-100 text-green-800',
  'in-progress':'bg-blue-100 text-blue-700',
  pending:      'bg-gray-100 text-gray-600',
  skipped:      'bg-gray-100 text-gray-400',
  blocked:      'bg-red-100 text-red-700',
};
const TRACK_CATS=['Fixtures','Signage','Displays','RPS Tickets','SET Tickets'];
const TRACK_STATUSES=['On Track','In Progress','At Risk','Overdue','Blocked','Complete'];

// ═══════════════════════════════════════════════════════
//  DATE / TAB NAVIGATION
// ═══════════════════════════════════════════════════════
function setDate(d){state.date=d;document.getElementById('date-picker').value=d;render();}
function goToday(){setDate(isoToday());}
function prevDay(){const d=new Date(state.date+'T12:00:00');d.setDate(d.getDate()-1);setDate(d.toISOString().slice(0,10));}
function nextDay(){const d=new Date(state.date+'T12:00:00');d.setDate(d.getDate()+1);setDate(d.toISOString().slice(0,10));}

const ALL_TABS=['timeline','tasks','tracking','weekly'];
function setTab(t){
  state.tab=t;
  ALL_TABS.forEach(id=>{
    document.getElementById('tab-'+id).className='px-5 py-2.5 text-sm whitespace-nowrap '+(id===t?'tab-active':'tab-inactive');
    document.getElementById('tab-content-'+id).classList.toggle('hidden',id!==t);
  });
  renderTab(t);
}

// ═══════════════════════════════════════════════════════
//  RENDER ORCHESTRATOR
// ═══════════════════════════════════════════════════════
function render(){
  const d=new Date(state.date+'T12:00:00');
  const dayName=DAY_NAMES[d.getDay()];
  document.getElementById('hdr-date').textContent=
    d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+
    ' · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('date-picker').value=state.date;
  document.getElementById('weekly-note-banner').textContent=WEEKLY_NOTES[dayName]||'';
  renderNudges(dayName);
  renderBadges();
  renderTab(state.tab);
}
function renderTab(t){
  if(t==='timeline') renderTimeline();
  if(t==='tasks')    renderTasks();
  if(t==='tracking') renderTracking();
  if(t==='weekly')   renderWeekly();
}

// ═══════════════════════════════════════════════════════
//  NUDGES
// ═══════════════════════════════════════════════════════
function renderNudges(dayName){
  const isToday=state.date===isoToday();
  if(!isToday){document.getElementById('nudge-bar').innerHTML='';return;}
  const now=new Date(),hour=now.getHours()+now.getMinutes()/60;
  const blocks=getBlocks(state.date),store=getStore(),db=store.blocks[state.date]||{};
  const nudges=[];
  const cur=blocks.find(b=>!b.isLunch&&b.start<=hour&&hour<b.end);
  if(cur){
    const st=(db[cur.id]||{}).status||'pending';
    if(st==='pending')     nudges.push({level:'info',   icon:'🕐',text:`You are in: <strong>${cur.label}</strong> — ${cur.time}`});
    if(st==='in-progress') nudges.push({level:'success',icon:'✅',text:`In progress: <strong>${cur.label}</strong> — keep going!`});
  }
  blocks.filter(b=>!b.isLunch&&b.end<=hour).forEach(b=>{
    const st=(db[b.id]||{}).status||'pending';
    if(!['done','skipped'].includes(st))
      nudges.push({level:'warning',icon:'⚠️',text:`Not yet marked done: <strong>${b.label}</strong> (${b.time})`});
  });
  if(dayName==='Thursday'&&hour>=8.5&&hour<9) nudges.push({level:'critical',icon:'🚨',text:'JSR is due at 9:00 AM — submit it right now!'});
  if(dayName==='Friday'  &&hour>=8.5&&hour<9) nudges.push({level:'critical',icon:'🚨',text:'Weekly Summary is due at 9:00 AM — send it right now!'});
  const tasks=store.tasks.filter(t=>!t.done);
  const crits=tasks.filter(t=>t.critical||t.blocked);
  if(crits.length) nudges.push({level:'critical',icon:'🚨',text:`${crits.length} critical or blocked task${crits.length>1?'s':''} need your attention now.`});
  const unowned=tasks.filter(t=>!t.owner&&t.list==='today');
  if(unowned.length) nudges.push({level:'warning',icon:'⚠️',text:`${unowned.length} item${unowned.length>1?'s':''} in Today have no owner — assign one now.`});
  document.getElementById('nudge-bar').innerHTML=nudges.map(n=>
    `<div class="nudge-${n.level} rounded px-3 py-2 text-sm flex items-start gap-2">
       <span>${n.icon}</span><span>${n.text}</span></div>`).join('');
}

function renderBadges(){
  const store=getStore(),tasks=store.tasks.filter(t=>!t.done);
  const tc=tasks.filter(t=>t.list==='today').length;
  const oc=tasks.filter(t=>t.list==='obstacles').length;
  const uc=tasks.filter(t=>t.list==='upcoming').length;
  const cc=tasks.filter(t=>t.critical||t.blocked).length;
  const nw=tasks.filter(t=>!t.owner&&t.list==='today').length;
  let h='';
  if(nw) h+=`<span class="bg-red-100 text-red-700 border border-red-300 px-2 py-1 rounded-full text-xs font-semibold">🚫 ${nw} Unowned</span>`;
  if(cc) h+=`<span class="bg-red-600 text-white px-2 py-1 rounded-full text-xs font-bold">🚨 ${cc} Critical/Blocked</span>`;
  h+=`<span class="bg-blue-100 text-blue-700 border border-blue-300 px-2 py-1 rounded-full text-xs">📌 Today: ${tc} &nbsp;|&nbsp; ⛔ Obstacles: ${oc} &nbsp;|&nbsp; 🔜 Upcoming: ${uc}</span>`;
  document.getElementById('status-badges').innerHTML=h;
}

// ═══════════════════════════════════════════════════════
//  TIMELINE — guided block renderer
// ═══════════════════════════════════════════════════════
function renderTimeline(){
  const blocks=getBlocks(state.date),store=getStore(),db=store.blocks[state.date]||{};
  const now=new Date(),hour=now.getHours()+now.getMinutes()/60,isToday=state.date===isoToday();

  const html=blocks.map((b,idx)=>{
    // ── Lunch block ──────────────────────────────────────
    if(b.isLunch) return `
      <div class="bg-white rounded-2xl border border-gray-100 px-5 py-3 flex items-center gap-3 text-gray-400">
        <span class="text-xl">🍽️</span>
        <div>
          <div class="font-medium text-gray-500 text-sm">Lunch</div>
          <div class="text-xs">${b.time}</div>
        </div>
      </div>`;

    const bData=db[b.id]||{};
    const status=bData.status||'pending';
    const notes=bData.notes||'';
    const checks=bData.taskChecks||{};
    const isCurrent=isToday&&b.start<=hour&&hour<b.end;
    const isPast   =isToday&&b.end<=hour;
    const isDone   =['done','skipped'].includes(status);
    const isBlocked=status==='blocked';

    // border style based on state
    const borderClass=isCurrent?'border-blue-400 shadow-[0_0_0_3px_#dbeafe]':
      isBlocked?'border-red-300':isDone?'border-green-200':
      isPast&&!isDone?'border-orange-200':'border-gray-100';

    // phase pill
    const phase=PHASES[b.phase]||PHASES.admin;
    const phasePill=b.phase?`<span class="phase-pill ${phase.color}">${phase.label}</span>`:'';

    // header icon
    const icon=isCurrent?'▶️':isPast&&!isDone?'⚠️':isDone?'✅':'🕐';

    // task checklist
    const taskRows=(b.tasks||[]).map((t,i)=>{
      const txt=typeof t==='string'?t:t.text;
      const tip=typeof t==='string'?null:t.tip;
      const checked=!!checks[i];
      const tipHtml=tip?`<span class="tip ml-1 cursor-help">
        <span class="text-gray-400 text-xs">ⓘ</span>
        <span class="tip-text">${esc(tip)}</span></span>`:'';
      return `
        <li class="flex items-start gap-2.5 py-1 px-2 rounded-lg cursor-pointer hover:bg-gray-50"
            onclick="toggleBlockTask('${b.id}',${i})">
          <div class="mt-0.5 w-4 h-4 rounded border-2 shrink-0 flex items-center justify-center
                      ${checked?'bg-[#0053e2] border-[#0053e2]':'border-gray-300'}">
            ${checked?'<svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
          </div>
          <span class="text-sm leading-snug ${checked?'line-through text-gray-400':'text-gray-700'}">${esc(txt)}${tipHtml}</span>
        </li>`;}).join('');

    // closeout checklist
    let coHtml='';
    if(b.closeoutChecks){
      const coChecks=bData.coChecks||{};
      const done=b.closeoutChecks.filter(c=>coChecks[c.id]).length;
      const all=done===b.closeoutChecks.length;
      const pct=Math.round(done/b.closeoutChecks.length*100);
      coHtml=`
        <div class="mt-3 border border-gray-100 rounded-xl overflow-hidden">
          <div class="bg-gray-700 text-white px-4 py-2 text-xs font-bold flex justify-between">
            <span>🔒 Closeout Checklist</span>
            <span class="${all?'text-green-400':'text-yellow-300'}">${done}/${b.closeoutChecks.length} complete</span>
          </div>
          ${b.closeoutChecks.map(c=>`
            <div class="flex items-center gap-3 px-4 py-2.5 cursor-pointer hover:bg-gray-50 border-b border-gray-50"
                 onclick="toggleCoCheck('${b.id}','${c.id}')">
              <div class="w-5 h-5 rounded-full flex items-center justify-center shrink-0
                          ${coChecks[c.id]?'bg-green-500':'border-2 border-gray-300'}">
                ${coChecks[c.id]?'<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
              </div>
              <span class="text-sm ${coChecks[c.id]?'line-through text-gray-400':'text-gray-700'}">${c.label}</span>
            </div>`).join('')}
          <div class="px-4 pt-1 pb-3">
            <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full transition-all ${all?'bg-green-500':'bg-[#0053e2]'}" style="width:${pct}%"></div>
            </div>
          </div>
          ${all?`<div class="bg-green-50 text-green-700 text-xs text-center py-2 font-semibold border-t border-green-100">✅ Clean handoff — great work today.</div>`:''}
        </div>
        <textarea placeholder="Overnight notes for the crew — be specific about what was done, what wasn't, and what to watch for…"
          rows="3" onblur="setBlockField('${b.id}','coNotes',this.value)"
          class="w-full mt-2 text-sm border border-gray-200 rounded-xl px-3 py-2 resize-none focus:border-blue-400"
          >${esc(bData.coNotes||'')}</textarea>`;
    }

    const statusOpts=STATUS_OPTS.map(s=>`<option value="${s}" ${s===status?'selected':''}>${s}</option>`).join('');

    return `
    <details class="bg-white rounded-2xl border ${borderClass} overflow-hidden transition-all"
             ${isCurrent?'open':''}>
      <summary class="px-5 py-4 flex items-center gap-4 hover:bg-gray-50 select-none">
        <span class="text-xl shrink-0">${icon}</span>
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-2 mb-0.5">
            <span class="font-bold text-gray-900 text-sm">${esc(b.label)}</span>
            ${phasePill}
          </div>
          <div class="text-xs text-gray-500">${b.time}</div>
        </div>
        <span class="text-xs px-2.5 py-1 rounded-full font-semibold shrink-0 ${STATUS_COLORS[status]||'bg-gray-100 text-gray-600'}">${status}</span>
      </summary>

      <div class="border-t border-gray-100 px-5 py-4 space-y-4">

        <!-- Description -->
        <p class="text-sm text-gray-700 leading-relaxed">${esc(b.description||'')}</p>

        <!-- Why this matters -->
        ${b.why?`
        <div class="flex items-start gap-2.5 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3">
          <span class="text-base shrink-0 mt-0.5">💡</span>
          <div>
            <div class="text-xs font-bold text-amber-800 uppercase tracking-wide mb-1">Why this matters</div>
            <p class="text-sm text-amber-900 leading-relaxed">${esc(b.why)}</p>
          </div>
        </div>`:''}

        <!-- Checklist -->
        ${taskRows?`
        <div>
          <div class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Key Actions</div>
          <ul class="space-y-0.5">${taskRows}</ul>
        </div>`:''}

        <!-- Closeout (only on closeout block) -->
        ${coHtml}

        <!-- Done looks like -->
        ${b.output?`
        <div class="flex items-start gap-2.5 bg-green-50 border border-green-100 rounded-xl px-4 py-3">
          <span class="text-base shrink-0 mt-0.5">✅</span>
          <div>
            <div class="text-xs font-bold text-green-800 uppercase tracking-wide mb-1">Done looks like</div>
            <p class="text-sm text-green-900 leading-relaxed">${esc(b.output)}</p>
          </div>
        </div>`:''}

        <!-- Block controls -->
        <div class="flex flex-wrap items-center gap-3 pt-1 border-t border-gray-50">
          <div class="flex items-center gap-2">
            <label class="text-xs font-medium text-gray-500">Mark this block:</label>
            <select onchange="setBlockField('${b.id}','status',this.value)"
              class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white focus:border-blue-400">
              ${statusOpts}
            </select>
          </div>
        </div>
        <textarea placeholder="Add notes for this block…" rows="2"
          onblur="setBlockField('${b.id}','notes',this.value)"
          class="w-full text-sm border border-gray-200 rounded-xl px-3 py-2 resize-none focus:border-blue-400"
          >${esc(notes)}</textarea>
      </div>
    </details>`;
  }).join('');

  // Progress indicator
  const workBlocks=blocks.filter(b=>!b.isLunch);
  const db2=getStore().blocks[state.date]||{};
  const doneCount=workBlocks.filter(b=>['done','skipped'].includes((db2[b.id]||{}).status||'pending')).length;
  const pct=Math.round(doneCount/workBlocks.length*100);
  const progress=`
    <div class="bg-white rounded-2xl border border-gray-100 px-5 py-3 flex items-center gap-4 mb-3">
      <div class="flex-1">
        <div class="flex justify-between text-xs text-gray-500 mb-1">
          <span class="font-semibold">Day Progress</span>
          <span>${doneCount} of ${workBlocks.length} blocks done</span>
        </div>
        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all ${pct===100?'bg-green-500':'bg-[#0053e2]'}" style="width:${pct}%"></div>
        </div>
      </div>
      <span class="text-sm font-bold ${pct===100?'text-green-600':'text-blue-700'}">${pct}%</span>
    </div>`;

  document.getElementById('tab-content-timeline').innerHTML=progress+`<div class="space-y-2">${html}</div>`;
}

function toggleBlockTask(blockId,idx){
  const s=getStore();
  const b=s.blocks[state.date]||(s.blocks[state.date]={});
  const blk=b[blockId]||(b[blockId]={});
  const tc=blk.taskChecks||(blk.taskChecks={});
  tc[idx]=!tc[idx];
  save(s); renderTimeline();
}
function toggleCoCheck(blockId,checkId){
  const s=getStore();
  const b=s.blocks[state.date]||(s.blocks[state.date]={});
  const blk=b[blockId]||(b[blockId]={});
  const cc=blk.coChecks||(blk.coChecks={});
  cc[checkId]=!cc[checkId];
  save(s); renderTimeline();
}
function setBlockField(blockId,field,val){
  const s=getStore();
  const b=s.blocks[state.date]||(s.blocks[state.date]={});
  const blk=b[blockId]||(b[blockId]={});
  blk[field]=val;
  save(s); renderBadges();
}

// ═══════════════════════════════════════════════════════
//  TASKS TAB
// ═══════════════════════════════════════════════════════
function renderTasks(){
  const store=getStore(),active=store.tasks.filter(t=>!t.done),done=store.tasks.filter(t=>t.done).slice(-5).reverse();
  const lists=[
    {id:'today',     label:'📌 Today — Must Do',      color:'bg-[#0053e2]',hint:'Everything that must happen today. Every item needs an owner.'},
    {id:'obstacles', label:'⛔ Obstacles — Escalate',  color:'bg-red-600',  hint:'Blocked items that need escalation. Do not sit on these.'},
    {id:'upcoming',  label:'🔜 Upcoming',              color:'bg-gray-700', hint:'Future work — not today. If it is not here yet, do not act on it yet.'},
  ];
  const html=lists.map(lst=>{
    const items=active.filter(t=>t.list===lst.id).sort((a,b)=>(b.critical?1:0)-(a.critical?1:0)||(b.blocked?1:0)-(a.blocked?1:0));
    return `
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
      <div class="${lst.color} text-white px-5 py-3 flex items-center justify-between">
        <div>
          <div class="font-bold text-sm">${lst.label} <span class="opacity-60">(${items.length})</span></div>
          <div class="text-xs opacity-70 mt-0.5">${lst.hint}</div>
        </div>
        <button onclick="openAddTask('${lst.id}')"
          class="bg-white/20 hover:bg-white/30 text-xs font-bold px-3 py-1.5 rounded-lg">+ Add</button>
      </div>
      <div class="divide-y divide-gray-50 px-2">
        ${items.length?items.map(t=>taskRow(t,lst.id)).join(''):`<p class="text-gray-400 italic text-sm py-3 px-2">Nothing here.</p>`}
      </div>
    </div>`;
  }).join('');
  const doneHtml=done.length?`
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mt-3">
      <div class="bg-green-700 text-white px-5 py-2 text-sm font-bold">✅ Recently Completed</div>
      <div class="divide-y divide-gray-50 px-2">
        ${done.map(t=>`<div class="py-2 px-2 flex items-center gap-2 text-sm text-gray-400">
          <span>✅</span><span class="flex-1 line-through">${esc(t.text)}</span>
          ${t.owner?`<span class="text-xs">👤 ${esc(t.owner)}</span>`:''}
          <button onclick="uncompleteTask('${t.id}')" class="text-xs text-blue-500 hover:underline">undo</button>
        </div>`).join('')}
      </div>
    </div>`:'';
  document.getElementById('tab-content-tasks').innerHTML=`<div class="space-y-3">${html}</div>${doneHtml}`;
}

function taskRow(t,cur){
  const others=['today','obstacles','upcoming'].filter(l=>l!==cur);
  return `
  <div class="py-2.5 px-2 flex items-start gap-2.5">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')"
      class="mt-1 h-4 w-4 rounded border-gray-300 text-blue-600 shrink-0 cursor-pointer">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-1.5">
        ${t.critical?'<span class="text-xs bg-red-600 text-white px-1.5 py-0.5 rounded font-bold">🚨 CRITICAL</span>':''}
        ${t.blocked ?'<span class="text-xs bg-orange-100 text-orange-700 border border-orange-200 px-1.5 py-0.5 rounded font-bold">⛔ BLOCKED</span>':''}
        <span class="text-sm text-gray-800">${esc(t.text)}</span>
      </div>
      <div class="flex flex-wrap items-center gap-2 mt-0.5">
        ${t.owner?`<span class="text-xs text-gray-500">👤 ${esc(t.owner)}</span>`:`<span class="text-xs text-red-500 font-semibold">⚠ No owner — assign one</span>`}
        ${t.notes?`<span class="text-xs text-gray-400 italic">${esc(t.notes.slice(0,60))}</span>`:''}
      </div>
      <div class="flex flex-wrap gap-2 mt-1">
        ${others.map(l=>`<button onclick="moveTask('${t.id}','${l}')" class="text-xs text-gray-400 hover:text-blue-600">→ ${l}</button>`).join('')}
        <button onclick="editTask('${t.id}')" class="text-xs text-gray-400 hover:text-blue-600">edit</button>
        <button onclick="deleteTask('${t.id}')" class="text-xs text-gray-400 hover:text-red-500">delete</button>
      </div>
    </div>
  </div>`;
}

function openAddTask(list){
  document.getElementById('modal-content').innerHTML=`
    <div class="px-5 py-5">
      <h3 class="font-bold text-gray-900 mb-1">Add to ${list}</h3>
      <p class="text-xs text-gray-500 mb-4">${list==='today'?'Must happen today — assign an owner.':list==='obstacles'?'Something blocked that needs escalation.':'Future work — not for today.'}</p>
      <div class="space-y-3">
        <input id="t-text" placeholder="What needs to happen? *"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400">
        <input id="t-owner" placeholder="Who owns this? (name or role)"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400">
        <textarea id="t-notes" placeholder="Any context or notes…" rows="2"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none focus:border-blue-400"></textarea>
        <div class="flex gap-4">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="t-critical" class="rounded"> 🚨 Critical</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="t-blocked"  class="rounded"> ⛔ Blocked</label>
        </div>
        <div class="flex gap-2 pt-1">
          <button onclick="saveNewTask('${list}')"
            class="flex-1 bg-[#0053e2] text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-[#003eb0]">Add Task</button>
          <button onclick="closeModal()"
            class="flex-1 bg-gray-100 text-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-200">Cancel</button>
        </div>
      </div>
    </div>`;
  showModal(); document.getElementById('t-text').focus();
}

function saveNewTask(list){
  const text=document.getElementById('t-text').value.trim(); if(!text) return;
  const s=getStore();
  s.tasks.push({id:uid(),list,text,owner:document.getElementById('t-owner').value.trim(),
    notes:document.getElementById('t-notes').value.trim(),
    critical:document.getElementById('t-critical').checked,
    blocked:document.getElementById('t-blocked').checked,done:false,createdAt:new Date().toISOString()});
  save(s); closeModal(); renderTasks(); renderBadges();
}
function editTask(id){
  const s=getStore(),t=s.tasks.find(x=>x.id===id); if(!t) return;
  document.getElementById('modal-content').innerHTML=`
    <div class="px-5 py-5">
      <h3 class="font-bold text-gray-900 mb-4">Edit Task</h3>
      <div class="space-y-3">
        <input id="et-text" value="${esc(t.text)}"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400">
        <input id="et-owner" value="${esc(t.owner||'')}" placeholder="Owner"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400">
        <textarea id="et-notes" rows="2"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none">${esc(t.notes||'')}</textarea>
        <select id="et-list" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white">
          ${['today','obstacles','upcoming'].map(l=>`<option value="${l}" ${t.list===l?'selected':''}>${l}</option>`).join('')}
        </select>
        <div class="flex gap-4">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="et-critical" ${t.critical?'checked':''} class="rounded"> 🚨 Critical</label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="et-blocked"  ${t.blocked ?'checked':''} class="rounded"> ⛔ Blocked</label>
        </div>
        <div class="flex gap-2 pt-1">
          <button onclick="saveEditTask('${id}')"
            class="flex-1 bg-[#0053e2] text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-[#003eb0]">Save</button>
          <button onclick="closeModal()"
            class="flex-1 bg-gray-100 text-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-200">Cancel</button>
        </div>
      </div>
    </div>`;
  showModal();
}
function saveEditTask(id){
  const s=getStore(),t=s.tasks.find(x=>x.id===id); if(!t) return;
  t.text=document.getElementById('et-text').value.trim();
  t.owner=document.getElementById('et-owner').value.trim();
  t.notes=document.getElementById('et-notes').value.trim();
  t.list=document.getElementById('et-list').value;
  t.critical=document.getElementById('et-critical').checked;
  t.blocked=document.getElementById('et-blocked').checked;
  save(s); closeModal(); renderTasks(); renderBadges();
}
function toggleTask(id){
  const s=getStore(),t=s.tasks.find(x=>x.id===id); if(!t) return;
  t.done=!t.done; if(t.done) t.doneAt=new Date().toISOString();
  save(s); renderTasks(); renderBadges();
}
function uncompleteTask(id){
  const s=getStore(),t=s.tasks.find(x=>x.id===id);
  if(t){t.done=false;delete t.doneAt;save(s);renderTasks();renderBadges();}
}
function moveTask(id,nl){
  const s=getStore(),t=s.tasks.find(x=>x.id===id);
  if(t){t.list=nl;save(s);renderTasks();renderBadges();}
}
function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  const s=getStore(); s.tasks=s.tasks.filter(x=>x.id!==id); save(s); renderTasks(); renderBadges();
}

//  TRACKING SHEETS TAB
// ═══════════════════════════════════════════════════════
function renderTracking(){
  const s=getStore(),projs=s.projects||[],url=s.sheetUrl||'';
  const alerts=projs.filter(p=>['Overdue','Blocked'].includes(p.status)||!p.owner);
  const alertHtml=alerts.length?`
    <div class="bg-red-50 border border-red-200 rounded-2xl px-4 py-3 mb-4">
      <p class="text-red-700 font-bold text-xs uppercase mb-2">🚨 Needs Attention</p>
      ${alerts.map(p=>`<div class="text-sm text-red-700">• ${esc(p.name)} — ${!p.owner?'<strong>NO OWNER</strong>':esc(p.status)}</div>`).join('')}
    </div>`:'';

  const summaryCards=TRACK_CATS.map(cat=>{
    const items=projs.filter(p=>p.category===cat);
    const issues=items.filter(p=>['Overdue','Blocked'].includes(p.status)||!p.owner);
    const done=items.filter(p=>p.status==='Complete').length;
    const color=issues.length?'border-red-200 bg-red-50':done===items.length&&items.length?'border-green-200 bg-green-50':'border-gray-200 bg-white';
    const badge=issues.length?`<span class="text-xs text-red-600 font-bold">${issues.length} issue${issues.length>1?'s':''}</span>`:
      items.length?`<span class="text-xs text-green-600">${done}/${items.length} done</span>`:
      `<span class="text-xs text-gray-400">No items</span>`;
    return `<div class="rounded-xl border ${color} px-3 py-2.5 flex items-center justify-between">
      <span class="text-sm font-semibold text-gray-800">${cat}</span>${badge}</div>`;
  }).join('');

  const catSections=TRACK_CATS.map(cat=>{
    const items=projs.filter(p=>p.category===cat); if(!items.length) return '';
    const rows=items.map(p=>`
      <tr class="border-b border-gray-50 hover:bg-gray-50">
        <td class="px-3 py-2 text-sm font-medium">${esc(p.name)}</td>
        <td class="px-3 py-2"><span class="text-xs px-2 py-0.5 rounded-full font-medium ${trackStatusColor(p.status)}">${esc(p.status)}</span></td>
        <td class="px-3 py-2 text-sm ${!p.owner?'text-red-500 font-semibold':'text-gray-600'}">${p.owner?esc(p.owner):'⚠ Unowned'}</td>
        <td class="px-3 py-2 text-xs text-gray-500">${esc(p.dueDate||'')}</td>
        <td class="px-3 py-2 text-xs text-gray-400">${esc((p.notes||'').slice(0,50))}</td>
        <td class="px-3 py-2 text-xs text-gray-400">${p.updatedAt?new Date(p.updatedAt).toLocaleDateString():''}</td>
        <td class="px-3 py-2 whitespace-nowrap">
          <button onclick="editProject('${p.id}')" class="text-xs text-blue-500 hover:underline mr-2">edit</button>
          <button onclick="deleteProject('${p.id}')" class="text-xs text-red-400 hover:underline">del</button>
        </td>
      </tr>`).join('');
    return `<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 mb-3">
      <div class="bg-gray-700 text-white px-4 py-2 text-sm font-bold">${esc(cat)}</div>
      <div class="overflow-x-auto"><table class="w-full text-left" style="min-width:540px">
        <thead><tr class="bg-gray-50 text-xs text-gray-500 uppercase">
          <th class="px-3 py-2">Name</th><th class="px-3 py-2">Status</th>
          <th class="px-3 py-2">Owner</th><th class="px-3 py-2">Due</th>
          <th class="px-3 py-2">Notes</th><th class="px-3 py-2">Updated</th><th class="px-3 py-2"></th>
        </tr></thead><tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');

  document.getElementById('tab-content-tracking').innerHTML=`
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm px-5 py-4 mb-4 flex flex-wrap items-center gap-3">
      <span class="font-bold text-sm text-gray-800">📂 Live Tracking Sheet</span>
      ${url
        ?`<a href="${esc(url)}" target="_blank" class="bg-[#0053e2] text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-[#003eb0]">Open Tracking Sheet ↗</a>
           <button onclick="configSheetUrl()" class="text-xs text-gray-400 hover:text-blue-600">change URL</button>`
        :`<button onclick="configSheetUrl()" class="bg-[#ffc220] text-gray-900 text-sm font-semibold px-4 py-2 rounded-xl hover:bg-[#e6ae00]">+ Set Tracking Sheet URL</button>
          <span class="text-xs text-gray-400">Paste your SharePoint or Excel link once and open it directly from here.</span>`}
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 mb-4">${summaryCards}</div>
    ${alertHtml}
    ${catSections||`<div class="bg-white rounded-2xl p-8 text-center text-gray-400 italic border border-gray-100">No items yet.</div>`}
    <button onclick="openAddProject()" class="w-full bg-[#0053e2] text-white rounded-2xl py-3 text-sm font-semibold hover:bg-[#003eb0] mt-2">
      + Add Item to Tracking Sheet
    </button>`;
}

function trackStatusColor(s){
  return {'On Track':'bg-green-100 text-green-800','Complete':'bg-green-100 text-green-800',
    'In Progress':'bg-blue-100 text-blue-700','At Risk':'bg-amber-100 text-amber-800',
    'Overdue':'bg-red-100 text-red-800','Blocked':'bg-red-100 text-red-800'}[s]||'bg-gray-100 text-gray-600';
}
function configSheetUrl(){
  const s=getStore();
  document.getElementById('modal-content').innerHTML=`
    <div class="px-5 py-5">
      <h3 class="font-bold text-gray-900 mb-1">Set Tracking Sheet URL</h3>
      <p class="text-xs text-gray-500 mb-4">Paste your SharePoint or Excel Online link. It will open directly from this dashboard with one click.</p>
      <input id="su-url" value="${esc(s.sheetUrl||'')}" placeholder="https://walmart.sharepoint.com/..."
        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400 mb-3">
      <div class="flex gap-2">
        <button onclick="saveSheetUrl()" class="flex-1 bg-[#0053e2] text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-[#003eb0]">Save</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-200">Cancel</button>
      </div>
    </div>`;
  showModal(); document.getElementById('su-url').focus();
}
function saveSheetUrl(){const s=getStore();s.sheetUrl=document.getElementById('su-url').value.trim();save(s);closeModal();renderTracking();}
function openAddProject(){document.getElementById('modal-content').innerHTML=projectForm();showModal();}
function projectForm(p){
  const e=!!p;
  return `<div class="px-5 py-5">
    <h3 class="font-bold text-gray-900 mb-4">${e?'Edit':'Add'} Tracking Item</h3>
    <div class="space-y-3">
      <input id="pf-name" placeholder="Name / Ticket # *" value="${esc(p?.name||'')}"
        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400">
      <select id="pf-cat" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white">
        ${TRACK_CATS.map(c=>`<option ${(p?.category||'')=== c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select id="pf-status" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white">
        ${TRACK_STATUSES.map(s=>`<option ${(p?.status||'On Track')===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <input id="pf-owner" placeholder="Owner *" value="${esc(p?.owner||'')}"
        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-400">
      <input id="pf-due" type="date" value="${p?.dueDate||''}"
        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm">
      <textarea id="pf-notes" placeholder="Notes…" rows="2"
        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none">${esc(p?.notes||'')}</textarea>
      <div class="flex gap-2 pt-1">
        <button onclick="${e?`saveEditProject('${p.id}')`:'saveNewProject()'}"
          class="flex-1 bg-[#0053e2] text-white rounded-xl py-2.5 text-sm font-semibold hover:bg-[#003eb0]">${e?'Save':'Add Item'}</button>
        <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 rounded-xl py-2.5 text-sm hover:bg-gray-200">Cancel</button>
      </div>
    </div>
  </div>`;
}
function saveNewProject(){
  const n=document.getElementById('pf-name').value.trim(); if(!n) return;
  const s=getStore();
  s.projects.push({id:uid(),name:n,category:document.getElementById('pf-cat').value,
    status:document.getElementById('pf-status').value,owner:document.getElementById('pf-owner').value.trim(),
    dueDate:document.getElementById('pf-due').value,notes:document.getElementById('pf-notes').value.trim(),
    updatedAt:new Date().toISOString()});
  save(s); closeModal(); renderTracking();
}
function editProject(id){const s=getStore(),p=s.projects.find(x=>x.id===id);if(!p)return;document.getElementById('modal-content').innerHTML=projectForm(p);showModal();}
function saveEditProject(id){
  const s=getStore(),p=s.projects.find(x=>x.id===id); if(!p) return;
  p.name=document.getElementById('pf-name').value.trim();p.category=document.getElementById('pf-cat').value;
  p.status=document.getElementById('pf-status').value;p.owner=document.getElementById('pf-owner').value.trim();
  p.dueDate=document.getElementById('pf-due').value;p.notes=document.getElementById('pf-notes').value.trim();
  p.updatedAt=new Date().toISOString();save(s);closeModal();renderTracking();
}
function deleteProject(id){if(!confirm('Delete?'))return;const s=getStore();s.projects=s.projects.filter(x=>x.id!==id);save(s);renderTracking();}

// ═══════════════════════════════════════════════════════
//  WEEKLY TAB
// ═══════════════════════════════════════════════════════
function renderWeekly(){
  const today=new Date(),dow=today.getDay(),monday=new Date(today);
  monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const s=getStore();
  const days=Array.from({length:5},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d.toISOString().slice(0,10);});
  const rows=days.map(ds=>{
    const dn=new Date(ds+'T12:00:00'),dayName=DAY_NAMES[dn.getDay()];
    const blocks=getBlocks(ds),db=s.blocks[ds]||{};
    const work=blocks.filter(b=>!b.isLunch);
    const done=work.filter(b=>['done','skipped'].includes((db[b.id]||{}).status||'pending')).length;
    const pct=work.length?Math.round(done/work.length*100):0;
    const note=WEEKLY_NOTES[dayName]||'';
    const isToday=ds===isoToday();
    return `<div class="bg-white rounded-2xl border ${isToday?'border-blue-300 ring-2 ring-blue-100':'border-gray-100'} overflow-hidden shadow-sm">
      <div class="px-4 py-3 flex items-center justify-between ${isToday?'bg-blue-50':'bg-gray-50'}">
        <div class="flex items-center gap-2">
          <span class="font-bold text-gray-900">${dayName}</span>
          <span class="text-xs text-gray-500">${dn.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
          ${isToday?'<span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full font-bold">TODAY</span>':''}
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-500">${done}/${work.length}</span>
          <div class="w-20 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full rounded-full ${pct===100?'bg-green-500':'bg-[#0053e2]'}" style="width:${pct}%"></div>
          </div>
          <button onclick="setDate('${ds}');setTab('timeline')" class="text-xs text-blue-600 hover:underline ml-1">View →</button>
        </div>
      </div>
      ${note?`<div class="px-4 py-2 text-xs text-amber-700 bg-amber-50 border-t border-amber-100 font-medium">${note}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('tab-content-weekly').innerHTML=`
    <div class="space-y-2">${rows}</div>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mt-4">
      <div class="bg-gray-800 text-white px-4 py-2 text-sm font-bold">📅 Fixed Weekly Cadence</div>
      <div class="divide-y divide-gray-50">
        ${[['Tuesday','Planning Lock-In — finalize the weekly plan, confirm phasing, complete the weekly planner, review GC and flooring, finalize Adobe PDFs.'],
           ['Wednesday','Pre-Entry for JSR + REXPRT Update — start pre-entry today so Thursday is a calm submit, not a scramble.'],
           ['Thursday','⚠️ JSR DUE BY 9:00 AM — submit this first. Then follow up on all outstanding issues.'],
           ['Friday','⚠️ Weekly Summary DUE BY 9:00 AM — send before anything else. Then stabilize, resolve follow-ups, prep notes for Sunday.'],
        ].map(([d,n])=>`<div class="px-4 py-3 flex gap-3 text-sm"><span class="font-bold text-gray-700 w-24 shrink-0">${d}</span><span class="text-gray-600">${n}</span></div>`).join('')}
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mt-3">
      <div class="bg-gray-800 text-white px-4 py-2 text-sm font-bold">📋 The Three Lists — How Tracking Works</div>
      <div class="px-4 py-3 text-sm text-gray-700 space-y-1.5">
        <div>• Keep only three lists: <strong>Today</strong>, <strong>Obstacles</strong>, <strong>Upcoming</strong>. If it does not fit one of those, it waits.</div>
        <div>• <strong>Past due:</strong> escalate the same day. No waiting.</div>
        <div>• <strong>Open 24 hours:</strong> follow up. <strong>Open 48 hours:</strong> escalate, no exceptions.</div>
        <div>• Every item in Today must have an owner's name on it.</div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  MODAL + UTILS
// ═══════════════════════════════════════════════════════
function showModal(){document.getElementById('modal').classList.remove('hidden');}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init(){setDate(isoToday());setTab('timeline');setInterval(render,60000);}
init();
</script>
</body>
