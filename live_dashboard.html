<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPC Daily Operating Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .tab-active   { border-bottom: 3px solid #0053e2; color: #0053e2; font-weight: 700; }
  .tab-inactive { border-bottom: 3px solid transparent; color: #6b7280; }
  .tab-inactive:hover { color: #0053e2; }
  .nudge-info     { background:#eff6ff; border-left:4px solid #3b82f6; }
  .nudge-warning  { background:#fffbeb; border-left:4px solid #f59e0b; }
  .nudge-critical { background:#fef2f2; border-left:4px solid #ef4444; }
  .nudge-success  { background:#f0fdf4; border-left:4px solid #22c55e; }
  .modal-bg { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;
               display:flex;align-items:center;justify-content:center;padding:16px; }
  .modal-box { background:white;border-radius:16px;width:100%;max-width:480px;
                max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3); }
  details > summary { cursor:pointer; list-style:none; }
  details > summary::-webkit-details-marker { display:none; }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<div class="bg-[#0053e2] text-white px-4 py-3 flex flex-wrap items-center justify-between gap-3 sticky top-0 z-40 shadow-lg">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🏗️</span>
    <div>
      <div class="font-black text-lg leading-none">RPC Daily Operating Dashboard</div>
      <div id="hdr-date" class="text-xs opacity-80 mt-0.5"></div>
    </div>
  </div>
  <div class="flex flex-wrap items-center gap-2">
    <button onclick="prevDay()" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded text-sm">← Prev</button>
    <button onclick="goToday()" class="bg-[#ffc220] text-gray-900 font-bold px-3 py-1.5 rounded text-sm">Today</button>
    <button onclick="nextDay()" class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded text-sm">Next →</button>
    <input type="date" id="date-picker" onchange="setDate(this.value)"
      class="bg-white/20 border border-white/30 text-white px-2 py-1 rounded text-sm [color-scheme:dark]">
  </div>
</div>

<!-- PRIORITY BAR -->
<div class="bg-gray-800 text-white text-xs px-4 py-2 flex flex-wrap gap-x-6 gap-y-1">
  <span>📌 <b>1:</b> Make today's work happen.</span>
  <span>📌 <b>2:</b> Make tomorrow ready.</span>
  <span>📌 <b>3:</b> Escalate anything that could impact phasing — NOW.</span>
  <span id="weekly-note-banner" class="text-yellow-300 font-semibold"></span>
</div>

<!-- NUDGES -->
<div id="nudge-bar" class="px-4 pt-3 space-y-2 max-w-5xl mx-auto"></div>

<!-- STATUS BADGES -->
<div id="status-badges" class="px-4 pt-2 flex flex-wrap gap-2 max-w-5xl mx-auto"></div>

<!-- TABS -->
<div class="max-w-5xl mx-auto px-4 pt-3">
  <div class="flex gap-0 border-b border-gray-200">
    <button onclick="setTab('timeline')"  id="tab-timeline"  class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">🕐 Timeline</button>
    <button onclick="setTab('tasks')"     id="tab-tasks"     class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">📋 Tasks</button>
    <button onclick="setTab('tracking')"  id="tab-tracking"  class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">📊 Tracking Sheets</button>
    <button onclick="setTab('weekly')"    id="tab-weekly"    class="px-5 py-2.5 text-sm whitespace-nowrap tab-inactive">📅 Weekly</button>
  </div>
</div>

<!-- TAB CONTENT -->
<div class="max-w-5xl mx-auto px-4 pt-4 pb-16">
  <div id="tab-content-timeline"  class="hidden"></div>
  <div id="tab-content-tasks"     class="hidden"></div>
  <div id="tab-content-tracking"  class="hidden"></div>
  <div id="tab-content-weekly"    class="hidden"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-bg hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-box"><div id="modal-content"></div></div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────────
const KEY = 'rpc_dash_v3';
function load() { try { return JSON.parse(localStorage.getItem(KEY))||{}; } catch{ return {}; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function getStore() {
  const d = load();
  if (!d.tasks)     d.tasks    = [];
  if (!d.projects)  d.projects = [];
  if (!d.blocks)    d.blocks   = {};
  if (!d.sheetUrl)  d.sheetUrl = '';
  if (!d.summary)   d.summary  = {};  // { fixtures, signage, displays, rps, set } → { status, notes, updated }
  return d;
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function isoToday() { return new Date().toISOString().slice(0,10); }

// ── APP STATE ─────────────────────────────────────────────────────────────────
let state = { date: isoToday(), tab: 'timeline' };

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const CLOSEOUT_BLOCK = {
  id:'closeout', time:'1:00 – 2:00 PM', start:13, end:14, label:'🔒 Close Out + Prep',

    'Finish and finalize overnight notes',

    'Prepare anything to get ahead for tomorrow',

const BASE_SCHEDULE = [
  { id:'turnover',   time:'6:00 – 7:30 AM',    start:6,     end:7.5,  label:'Turnover + Reality Check',
    tasks:['Walk with overnight RPC','Review OneNote for completion and accuracy','Identify missing fixtures or incomplete work','Identify anything that could impact tonight'],
    output:'Short prioritized Today\'s Problems list.' },
  { id:'meeting',    time:'7:30 – 8:00 AM',    start:7.5,   end:8,    label:'Morning Meeting',
    tasks:['Capture every action item — not just listen','Write down what must be completed today','Write down what is behind','Assign an owner to every item — if unclear, assign one now'],
    output:'Clear action list with ownership assigned.' },
  { id:'followups',  time:'8:00 – 9:00 AM',    start:8,     end:9,    label:'Follow-Ups + Tracking Updates',
    tasks:['Send all follow-ups from the meeting','Connect with dayshift OPL and ISG on priorities','Escalate missing fixtures, unanswered tickets, missed deadlines','Update ALL Tracking Sheets — fixtures, signage, displays, RPS, SET','Place needed Add-On orders and log them to the sheet','Rule: past due → escalate same day | 24hr → follow up | 48hr → escalate'],
    output:'No unclear or unowned issues. Tracking fully updated.' },
  { id:'planning',   time:'9:00 – 9:30 AM',    start:9,     end:9.5,  label:'Quick Planning',
    tasks:['Confirm today\'s work is set up for success','Confirm what area is next in phasing','Are we on track today? Is the next area ready?','Adjust now or escalate if not'],
    output:'Clear plan for today. Awareness of next phase.' },
  { id:'validation', time:'9:30 – 10:45 AM',   start:9.5,   end:10.75,label:'Validation + Cleanup',
    tasks:['Verify everything needed for nightly notes is ready','Clean up email — keep only items needing follow-up','Send follow-ups on outstanding issues and continue escalation','Start or update third-shift notes and known issues'],
    output:'Clean inbox. Documented risks. All problems actively worked or escalated.' },
  { id:'lunch',      time:'11:00 AM – 12:00 PM',start:11,   end:12,   label:'Lunch', isLunch:true },

const SCHEDULE = {
  default: BASE_SCHEDULE,
  1: [ // Tuesday
    { id:'turnover',  time:'6:00 – 7:30 AM',   start:6,    end:7.5,  label:'Turnover + Reality Check',
      tasks:['Walk with overnight RPC','Review OneNote','Build prioritized problems list'], output:'Problems list.' },
    { id:'meeting',   time:'7:30 – 8:00 AM',   start:7.5,  end:8,    label:'Morning Meeting',
      tasks:['Capture action items','Assign ownership to every item'], output:'Action list with ownership.' },
    { id:'followups', time:'8:00 – 9:00 AM',   start:8,    end:9,    label:'Follow-Ups + Tracking Updates',
      tasks:['Send follow-ups','Update all tracking sheets','Escalate anything past due'], output:'Updated tracking.' },
    { id:'planning_lock', time:'9:00 – 10:45 AM', start:9, end:10.75, label:'📋 Planning Lock-In (Tuesday)',
      tasks:['Finalize the weekly plan','Confirm phasing','Complete the weekly planner','Review GC needs and flooring schedule','Finalize department PDFs in Adobe'],
      output:'Locked weekly plan. Phasing confirmed.' },
    { id:'lunch',     time:'11:00 AM – 12:00 PM',start:11, end:12,   label:'Lunch', isLunch:true },
    { id:'expenses',  time:'12:00 – 1:00 PM',  start:12,   end:13,   label:'Expenses (Previous Weeks)',
      tasks:['Complete expenses for all previous weeks','Submit for approval'], output:'Expenses submitted.' },
    CLOSEOUT_BLOCK,
  ],
  2: [ // Wednesday
    { id:'turnover',  time:'6:00 – 7:30 AM',   start:6,    end:7.5,  label:'Turnover + Reality Check',
      tasks:['Walk with overnight RPC','Review OneNote','Build problems list'], output:'Problems list.' },
    { id:'meeting',   time:'7:30 – 8:00 AM',   start:7.5,  end:8,    label:'Morning Meeting',
      tasks:['Capture action items','Assign ownership'], output:'Action list.' },
    { id:'followups', time:'8:00 – 9:00 AM',   start:8,    end:9,    label:'Follow-Ups + Tracking Updates',
      tasks:['Send follow-ups','Update all tracking sheets'], output:'Updated tracking.' },
    { id:'preentry',  time:'9:00 – 10:45 AM',  start:9,    end:10.75,label:'🔧 Pre-Entry + REXPRT Update (Wednesday)',
      tasks:['Begin pre-entry for JSR','Update REXPRT','Make everything clear and accessible for Thursday'], output:'Pre-entry complete. REXPRT updated.' },
    { id:'validation',time:'10:45 AM – 11:00 AM',start:10.75,end:11, label:'Validation + Cleanup',
      tasks:['Clean inbox','Send outstanding follow-ups','Document all risks'], output:'Clean inbox. Risks documented.' },
    { id:'lunch',     time:'11:00 AM – 12:00 PM',start:11, end:12,   label:'Lunch', isLunch:true },
    CLOSEOUT_BLOCK,
  ],
  3: [ // Thursday
    { id:'jsr_due',   time:'⚠️ By 9:00 AM',    start:6,    end:9,    label:'⚠️ JSR DUE BY 9:00 AM',
      tasks:['SUBMIT JSR BEFORE 9:00 AM — no exceptions','Confirm submission receipt'], output:'JSR submitted. Confirmation received.' },
    { id:'turnover',  time:'6:00 – 7:30 AM',   start:6,    end:7.5,  label:'Turnover + Reality Check',
      tasks:['Walk with overnight RPC','Review OneNote','Build problems list'], output:'Problems list.' },
    { id:'meeting',   time:'7:30 – 8:00 AM',   start:7.5,  end:8,    label:'Morning Meeting',
      tasks:['Capture action items','Assign ownership'], output:'Action list.' },
    { id:'followups', time:'8:00 – 9:00 AM',   start:8,    end:9,    label:'Follow-Ups + JSR Submission',
      tasks:['SUBMIT JSR if not already done','Send all follow-ups from morning meeting','Update all tracking sheets'], output:'JSR in. Tracking updated.' },
    { id:'validation',time:'9:00 – 10:45 AM',  start:9,    end:10.75,label:'Validation + Cleanup',
      tasks:['Clean inbox','Send outstanding follow-ups','Document all risks','Continue escalations'], output:'Clean inbox. Risks documented.' },
    { id:'lunch',     time:'11:00 AM – 12:00 PM',start:11, end:12,   label:'Lunch', isLunch:true },
    CLOSEOUT_BLOCK,
  ],
  4: [ // Friday
    { id:'weekly_summary', time:'⚠️ By 9:00 AM', start:6,  end:9,    label:'⚠️ WEEKLY SUMMARY DUE BY 9:00 AM',
      tasks:['SEND WEEKLY SUMMARY before 9:00 AM','Cover: progress, risks, key updates'], output:'Weekly summary sent.' },
    { id:'turnover',  time:'6:00 – 7:30 AM',   start:6,    end:7.5,  label:'Turnover + Reality Check',
      tasks:['Walk with overnight RPC','Review OneNote','Build problems list'], output:'Problems list.' },
    { id:'meeting',   time:'7:30 – 8:00 AM',   start:7.5,  end:8,    label:'Morning Meeting',
      tasks:['Capture action items','Assign ownership'], output:'Action list.' },
    { id:'admin_fri', time:'9:00 AM – 2:00 PM', start:9,   end:14,   label:'Admin + Stabilization (Friday)',
      tasks:['Send Weekly Summary if not done yet','Clean up overnight issues','Resolve all outstanding follow-ups','Prepare notes for Sunday','Leave the site controlled going into the weekend'],
      output:'Site controlled. Weekend handoff ready.' },
    { id:'lunch',     time:'11:00 AM – 12:00 PM',start:11, end:12,   label:'Lunch', isLunch:true },
    CLOSEOUT_BLOCK,
  ],
};

const WEEKLY_NOTES = {
  Tuesday:  '📅 Planning Lock-In — finalize the weekly plan and phasing today.',
  Wednesday:'📅 Pre-Entry day — begin JSR pre-entry and update REXPRT.',
  Thursday: '⚠️ JSR DUE BY 9:00 AM — this is the first thing you do.',
  Friday:   '⚠️ Weekly Summary DUE BY 9:00 AM — send before anything else.',
};

function getBlocks(dateStr) {
  const dow = new Date(dateStr+'T12:00:00').getDay();
  const map = {1:0, 2:1, 3:2, 4:3, 5:4};
  const key = map[dow];
  return SCHEDULE[key] !== undefined ? SCHEDULE[key] : SCHEDULE.default;
}

const STATUS_OPTS    = ['pending','in-progress','done','skipped','blocked'];
const STATUS_COLORS  = {
  done:         'bg-green-100 text-green-800',
  'in-progress':'bg-blue-100  text-blue-700',
  pending:      'bg-gray-100  text-gray-600',
  skipped:      'bg-gray-100  text-gray-400',
  blocked:      'bg-red-100   text-red-700',
};

// ── TRACKING SHEET CATEGORIES ─────────────────────────────────────────────────
const TRACK_CATS = ['Fixtures','Signage','Displays','RPS Tickets','SET Tickets'];
const TRACK_STATUSES = ['On Track','In Progress','At Risk','Overdue','Blocked','Complete'];

// ── DATE NAV ──────────────────────────────────────────────────────────────────
function setDate(d){ state.date=d; document.getElementById('date-picker').value=d; render(); }
function goToday() { setDate(isoToday()); }
function prevDay() { const d=new Date(state.date+'T12:00:00'); d.setDate(d.getDate()-1); setDate(d.toISOString().slice(0,10)); }
function nextDay() { const d=new Date(state.date+'T12:00:00'); d.setDate(d.getDate()+1); setDate(d.toISOString().slice(0,10)); }

// ── TABS ──────────────────────────────────────────────────────────────────────
const ALL_TABS = ['timeline','tasks','tracking','weekly'];
function setTab(t){
  state.tab = t;
  ALL_TABS.forEach(id=>{
    document.getElementById('tab-'+id).className = 'px-5 py-2.5 text-sm whitespace-nowrap '+(id===t?'tab-active':'tab-inactive');
    document.getElementById('tab-content-'+id).classList.toggle('hidden',id!==t);
  });
  renderTab(t);
}

// ── RENDER ORCHESTRATOR ───────────────────────────────────────────────────────
function render(){
  const d = new Date(state.date+'T12:00:00');
  const dayName = DAY_NAMES[d.getDay()];
  document.getElementById('hdr-date').textContent =
    d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+
    ' · '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('date-picker').value = state.date;
  document.getElementById('weekly-note-banner').textContent = WEEKLY_NOTES[dayName]||'';
  renderNudges(dayName);
  renderBadges();
  renderTab(state.tab);
}
function renderTab(t){
  if(t==='timeline') renderTimeline();
  if(t==='tasks')    renderTasks();
  if(t==='tracking') renderTracking();
  if(t==='weekly')   renderWeekly();
}

// ── NUDGES ────────────────────────────────────────────────────────────────────
function renderNudges(dayName){
  const isToday = state.date===isoToday();
  if(!isToday){ document.getElementById('nudge-bar').innerHTML=''; return; }
  const now=new Date(), hour=now.getHours()+now.getMinutes()/60;
  const blocks=getBlocks(state.date);
  const store=getStore();
  const dayBlocks=store.blocks[state.date]||{};
  const nudges=[];

  const cur = blocks.find(b=>!b.isLunch && b.start<=hour && hour<b.end);
  if(cur){
    const st=(dayBlocks[cur.id]||{}).status||'pending';
    if(st==='pending')      nudges.push({level:'info',   icon:'🕐',text:`Current block: <strong>${cur.label}</strong> (${cur.time})`});
    if(st==='in-progress')  nudges.push({level:'success',icon:'✅',text:`In progress: <strong>${cur.label}</strong> — keep going!`});
  }
  blocks.filter(b=>!b.isLunch&&b.end<=hour).forEach(b=>{
    const st=(dayBlocks[b.id]||{}).status||'pending';
    if(!['done','skipped'].includes(st))
      nudges.push({level:'warning',icon:'⚠️',text:`Not yet done: <strong>${b.label}</strong> (${b.time})`});
  });
  if(dayName==='Thursday'&&hour>=8.5&&hour<9) nudges.push({level:'critical',icon:'🚨',text:'JSR due at 9:00 AM — submit NOW!'});
  if(dayName==='Friday'&&hour>=8.5&&hour<9)   nudges.push({level:'critical',icon:'🚨',text:'Weekly Summary due at 9:00 AM — send NOW!'});

  const tasks=store.tasks.filter(t=>!t.done);
  const crits=tasks.filter(t=>t.critical||t.blocked);
  if(crits.length) nudges.push({level:'critical',icon:'🚨',text:`${crits.length} critical/blocked task${crits.length>1?'s':''} need attention.`});
  const unowned=tasks.filter(t=>!t.owner&&t.list==='today');
  if(unowned.length) nudges.push({level:'warning',icon:'⚠️',text:`${unowned.length} Today task${unowned.length>1?'s':''} have no owner assigned.`});

  document.getElementById('nudge-bar').innerHTML=nudges.map(n=>
    `<div class="nudge-${n.level} rounded px-3 py-2 text-sm flex items-start gap-2">
       <span>${n.icon}</span><span>${n.text}</span></div>`).join('');
}

function renderBadges(){
  const store=getStore();
  const tasks=store.tasks.filter(t=>!t.done);
  const tc=tasks.filter(t=>t.list==='today').length;
  const oc=tasks.filter(t=>t.list==='obstacles').length;
  const uc=tasks.filter(t=>t.list==='upcoming').length;
  const cc=tasks.filter(t=>t.critical||t.blocked).length;
  const nowner=tasks.filter(t=>!t.owner&&t.list==='today').length;
  let html='';
  if(nowner) html+=`<span class="bg-red-100 text-red-700 border border-red-300 px-2 py-1 rounded-full text-xs font-semibold">🚫 ${nowner} Unowned</span>`;
  if(cc)     html+=`<span class="bg-red-600 text-white px-2 py-1 rounded-full text-xs font-bold">🚨 ${cc} Critical/Blocked</span>`;
  html+=`<span class="bg-blue-100 text-blue-700 border border-blue-300 px-2 py-1 rounded-full text-xs">📌 Today: ${tc} &nbsp;|&nbsp; ⛔ Obstacles: ${oc} &nbsp;|&nbsp; 🔜 Upcoming: ${uc}</span>`;
  document.getElementById('status-badges').innerHTML=html;
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function renderTimeline(){
  const blocks=getBlocks(state.date);
  const store=getStore();
  const dayBlocks=store.blocks[state.date]||{};
  const now=new Date(), hour=now.getHours()+now.getMinutes()/60;
  const isToday=state.date===isoToday();

  const html=blocks.map(b=>{
    if(b.isLunch) return `
      <div class="bg-white rounded-xl border border-gray-100 px-4 py-3 flex items-center gap-3 text-gray-400">
        <span>🍽️</span><span class="text-sm">${b.time} — Lunch</span></div>`;

    const bData    = dayBlocks[b.id]||{};
    const status   = bData.status||'pending';
    const notes    = bData.notes||'';
    const taskChecks = bData.taskChecks||{};
    const isCurrent  = isToday&&b.start<=hour&&hour<b.end;
    const isPast     = isToday&&b.end<=hour;

    const statusOpts = STATUS_OPTS.map(s=>
      `<option value="${s}" ${s===status?'selected':''}>${s}</option>`).join('');

    // Task checklist rows
    const tasksHtml = (b.tasks||[]).map((t,i)=>{
      const checked=!!taskChecks[i];
      return `
      <li class="flex items-start gap-2 text-sm cursor-pointer hover:bg-gray-50 rounded px-1 py-0.5"
          onclick="toggleBlockTask('${b.id}',${i})">
        <div class="mt-0.5 w-4 h-4 rounded border-2 flex items-center justify-center shrink-0
                    ${checked?'bg-[#0053e2] border-[#0053e2]':'border-gray-300'}">
          ${checked?'<svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
        </div>
        <span class="${checked?'line-through text-gray-400':'text-gray-700'}">${esc(t)}</span>
      </li>`;}).join('');

    // Closeout checklist (only on the closeout block)
    let closeoutHtml = '';
    if(b.closeoutChecks){
      const coChecks = bData.coChecks||{};
      const doneCount = b.closeoutChecks.filter(c=>coChecks[c.id]).length;
      const allDone   = doneCount===b.closeoutChecks.length;
      const pct       = Math.round(doneCount/b.closeoutChecks.length*100);
      closeoutHtml = `
        <div class="mt-2 border border-gray-100 rounded-lg overflow-hidden">
          <div class="bg-gray-700 text-white px-3 py-2 text-xs font-bold flex items-center justify-between">
            <span>🔒 Closeout Checklist</span>
            <span class="${allDone?'text-green-400':'text-yellow-300'}">${doneCount}/${b.closeoutChecks.length}</span>
          </div>
          <div class="divide-y divide-gray-50">
            ${b.closeoutChecks.map(c=>`
              <div class="flex items-center gap-3 px-3 py-2 cursor-pointer hover:bg-gray-50"
                   onclick="toggleCoCheck('${b.id}','${c.id}')">
                <div class="w-5 h-5 rounded-full flex items-center justify-center shrink-0
                            ${coChecks[c.id]?'bg-green-500':'border-2 border-gray-300'}">
                  ${coChecks[c.id]?'<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
                </div>
                <span class="text-sm ${coChecks[c.id]?'line-through text-gray-400':'text-gray-700'}">${c.label}</span>
              </div>`).join('')}
          </div>
          <div class="px-3 pb-2">
            <div class="h-1.5 bg-gray-100 rounded-full mt-2 overflow-hidden">
              <div class="h-full rounded-full transition-all ${allDone?'bg-green-500':'bg-[#0053e2]'}" style="width:${pct}%"></div>
            </div>
          </div>
          ${allDone?`<div class="bg-green-50 text-green-700 text-xs text-center py-2 font-semibold">✅ Closeout complete — clean handoff!</div>`:''}
        </div>
        <textarea placeholder="Overnight notes for the crew…" rows="3"
          onblur="setBlockField('${b.id}','coNotes',this.value)"
          class="w-full text-xs border border-gray-200 rounded px-3 py-2 mt-2 resize-none focus:border-blue-400"
          >${esc(bData.coNotes||'')}</textarea>`;
    }

    const icon = isCurrent ? '▶️' : (isPast && !['done','skipped'].includes(status)) ? '⚠️' : '🕐';

    return `
    <details class="bg-white rounded-xl border ${isCurrent?'border-blue-300 ring-2 ring-blue-200':'border-gray-100'} overflow-hidden"

          </div>
        </div>
        <span class="text-xs px-2 py-1 rounded-full font-medium shrink-0 ${STATUS_COLORS[status]||'bg-gray-100 text-gray-600'}">${status}</span>
      </summary>
      <div class="border-t border-gray-100 px-4 py-3 space-y-3">
        ${tasksHtml?`<ul class="space-y-0.5">${tasksHtml}</ul>`:''}
        ${b.output?`<div class="text-xs bg-green-50 border border-green-100 rounded px-3 py-2 text-green-800"><strong>Output:</strong> ${esc(b.output)}</div>`:''}
        ${closeoutHtml}
        <div class="flex items-center gap-2">
          <label class="text-xs font-medium text-gray-600 shrink-0">Block status:</label>
          <select onchange="setBlockField('${b.id}','status',this.value)"
            class="text-xs border border-gray-200 rounded px-2 py-1 bg-white">
            ${statusOpts}
          </select>
        </div>
        <textarea placeholder="Notes for this block…" rows="2"
          onblur="setBlockField('${b.id}','notes',this.value)"
          class="w-full text-xs border border-gray-200 rounded px-3 py-2 resize-none focus:border-blue-400"
          >${esc(notes)}</textarea>
      </div>
    </details>`;
  }).join('');

  document.getElementById('tab-content-timeline').innerHTML=`<div class="space-y-2">${html}</div>`;
}

function toggleBlockTask(blockId, idx){
  const store=getStore();
  if(!store.blocks[state.date]) store.blocks[state.date]={};
  if(!store.blocks[state.date][blockId]) store.blocks[state.date][blockId]={};
  if(!store.blocks[state.date][blockId].taskChecks) store.blocks[state.date][blockId].taskChecks={};
  store.blocks[state.date][blockId].taskChecks[idx]=!store.blocks[state.date][blockId].taskChecks[idx];
  save(store); renderTimeline();
}

function toggleCoCheck(blockId, checkId){
  const store=getStore();
  if(!store.blocks[state.date]) store.blocks[state.date]={};
  if(!store.blocks[state.date][blockId]) store.blocks[state.date][blockId]={};
  if(!store.blocks[state.date][blockId].coChecks) store.blocks[state.date][blockId].coChecks={};
  store.blocks[state.date][blockId].coChecks[checkId]=!store.blocks[state.date][blockId].coChecks[checkId];
  save(store); renderTimeline();
}

function setBlockField(blockId, field, val){
  const store=getStore();
  if(!store.blocks[state.date]) store.blocks[state.date]={};
  if(!store.blocks[state.date][blockId]) store.blocks[state.date][blockId]={};
  store.blocks[state.date][blockId][field]=val;
  save(store); renderBadges();
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
function renderTasks(){
  const store=getStore();
  const active=store.tasks.filter(t=>!t.done);
  const done=store.tasks.filter(t=>t.done).slice(-5).reverse();
  const lists=[
    {id:'today',     label:'📌 Today',     color:'bg-[#0053e2]', hint:'Must happen today.'},
    {id:'obstacles', label:'⛔ Obstacles',  color:'bg-red-600',   hint:'Blocked — needs escalation.'},
    {id:'upcoming',  label:'🔜 Upcoming',  color:'bg-gray-700',  hint:'Future work, not today.'},
  ];

  const html=lists.map(lst=>{
    const items=active.filter(t=>t.list===lst.id).sort((a,b)=>
      (b.critical?1:0)-(a.critical?1:0)||(b.blocked?1:0)-(a.blocked?1:0));
    const rows=items.length ? items.map(t=>taskRow(t,lst.id)).join('') :
      `<p class="text-gray-400 italic text-sm py-3 px-2">Nothing here.</p>`;
    return `
    <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
      <div class="${lst.color} text-white px-4 py-3 flex items-center justify-between">
        <div>
          <div class="font-bold text-sm">${lst.label} <span class="opacity-70">(${items.length})</span></div>
          <div class="text-xs opacity-70 mt-0.5">${lst.hint}</div>
        </div>
        <button onclick="openAddTask('${lst.id}')"
          class="bg-white/20 hover:bg-white/30 text-xs font-bold px-3 py-1.5 rounded-lg">+ Add</button>
      </div>
      <div class="divide-y divide-gray-50 px-2">${rows}</div>
    </div>`;
  }).join('');

  const doneHtml=done.length?`
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mt-3">
      <div class="bg-green-700 text-white px-4 py-2 text-sm font-bold">✅ Recently Completed</div>
      <div class="divide-y divide-gray-50 px-2">
        ${done.map(t=>`
          <div class="py-2 px-2 flex items-center gap-2 text-sm text-gray-400">
            <span>✅</span>
            <span class="flex-1 line-through">${esc(t.text)}</span>
            ${t.owner?`<span class="text-xs">👤 ${esc(t.owner)}</span>`:''}
            <button onclick="uncompleteTask('${t.id}')" class="text-xs text-blue-500 hover:underline">undo</button>
          </div>`).join('')}
      </div>
    </div>`:'';

  document.getElementById('tab-content-tasks').innerHTML=`<div class="space-y-3">${html}</div>${doneHtml}`;
}

function taskRow(t, currentList){
  const others=['today','obstacles','upcoming'].filter(l=>l!==currentList);
  const moves=others.map(l=>`<button onclick="moveTask('${t.id}','${l}')" class="text-xs text-gray-400 hover:text-blue-600">→ ${l}</button>`).join('');
  return `
  <div class="py-2 px-2 flex items-start gap-2">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')"
      class="mt-1 h-4 w-4 rounded border-gray-300 text-blue-600 shrink-0 cursor-pointer">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-1.5">
        ${t.critical?'<span class="text-xs bg-red-600 text-white px-1.5 py-0.5 rounded font-bold">🚨 CRITICAL</span>':''}
        ${t.blocked ?'<span class="text-xs bg-orange-100 text-orange-700 border border-orange-300 px-1.5 py-0.5 rounded font-bold">⛔ BLOCKED</span>':''}
        <span class="text-sm text-gray-800">${esc(t.text)}</span>
      </div>
      <div class="flex flex-wrap items-center gap-2 mt-0.5">
        ${t.owner?`<span class="text-xs text-gray-500">👤 ${esc(t.owner)}</span>`:
                  `<span class="text-xs text-red-500 font-semibold">⚠ No owner</span>`}
        ${t.notes?`<span class="text-xs text-gray-400 italic">${esc(t.notes.slice(0,60))}</span>`:''}
      </div>
      <div class="flex flex-wrap gap-2 mt-1">
        ${moves}
        <button onclick="editTask('${t.id}')" class="text-xs text-gray-400 hover:text-blue-600">edit</button>
        <button onclick="deleteTask('${t.id}')" class="text-xs text-gray-400 hover:text-red-500">delete</button>
      </div>
    </div>
  </div>`;
}

function saveNewTask(list){
  const text=document.getElementById('t-text').value.trim(); if(!text) return;

  store.tasks.push({id:uid(),list,text,
    owner:document.getElementById('t-owner').value.trim(),

    critical:document.getElementById('t-critical').checked,
    blocked:document.getElementById('t-blocked').checked,

function editTask(id){

  document.getElementById('modal-content').innerHTML=`

          <label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" id="et-blocked"  ${t.blocked ?'checked':''} class="rounded"> ⛔ Blocked</label>

function saveEditTask(id){
  const store=getStore(); const t=store.tasks.find(x=>x.id===id); if(!t) return;
  t.text=document.getElementById('et-text').value.trim();
  t.owner=document.getElementById('et-owner').value.trim();
  t.notes=document.getElementById('et-notes').value.trim();
  t.list=document.getElementById('et-list').value;
  t.critical=document.getElementById('et-critical').checked;
  t.blocked=document.getElementById('et-blocked').checked;
  save(store); closeModal(); renderTasks(); renderBadges();
}

function toggleTask(id){
  const store=getStore(); const t=store.tasks.find(x=>x.id===id); if(!t) return;
  t.done=!t.done; if(t.done) t.doneAt=new Date().toISOString();
  save(store); renderTasks(); renderBadges();
}
function uncompleteTask(id){
  const store=getStore(); const t=store.tasks.find(x=>x.id===id);
  if(t){t.done=false;delete t.doneAt;save(store);renderTasks();renderBadges();}
}
function moveTask(id,newList){
  const store=getStore(); const t=store.tasks.find(x=>x.id===id);
  if(t){t.list=newList;save(store);renderTasks();renderBadges();}
}
function deleteTask(id){
  if(!confirm('Delete this task?')) return;
  const store=getStore(); store.tasks=store.tasks.filter(x=>x.id!==id);
  save(store); renderTasks(); renderBadges();
}

// ── TRACKING SHEETS ───────────────────────────────────────────────────────────
function renderTracking(){
  const store=getStore();
  const sheetUrl=store.sheetUrl||'';
  const summary=store.summary||{};
  const projects=store.projects||[];

  // Summary cards for the 5 key categories
  const summaryCards=TRACK_CATS.map(cat=>{
    const s=summary[cat]||{};
    const catProjects=projects.filter(p=>p.category===cat);
    const issues=catProjects.filter(p=>['Overdue','Blocked'].includes(p.status)||!p.owner);
    const done=catProjects.filter(p=>p.status==='Complete').length;
    const color=issues.length?'border-red-300 bg-red-50':done===catProjects.length&&catProjects.length?'border-green-300 bg-green-50':'border-gray-200 bg-white';
    const badge=issues.length?`<span class="text-xs text-red-600 font-bold">${issues.length} issue${issues.length>1?'s':''}</span>`:
      catProjects.length?`<span class="text-xs text-green-600 font-semibold">${done}/${catProjects.length} done</span>`:
      `<span class="text-xs text-gray-400">No items</span>`;
    return `
      <div class="rounded-lg border ${color} px-3 py-2.5 flex items-center justify-between">
        <span class="text-sm font-semibold text-gray-800">${cat}</span>
        ${badge}
      </div>`;
  }).join('');

  // Alerts
  const alerts=projects.filter(p=>['Overdue','Blocked'].includes(p.status)||!p.owner);
  const alertHtml=alerts.length?`
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4">
      <p class="text-red-700 font-bold text-xs uppercase mb-2">🚨 Needs Attention</p>
      ${alerts.map(p=>`<div class="text-sm text-red-700">• ${esc(p.name)} — ${!p.owner?'<strong>NO OWNER</strong>':esc(p.status)}</div>`).join('')}
    </div>`:'';

  // Projects grouped by category
  const catSections=TRACK_CATS.map(cat=>{
    const items=projects.filter(p=>p.category===cat);
    if(!items.length) return '';
    const rows=items.map(p=>`
      <tr class="border-b border-gray-50 hover:bg-gray-50">
        <td class="px-3 py-2 text-sm font-medium">${esc(p.name)}</td>
        <td class="px-3 py-2"><span class="text-xs px-2 py-0.5 rounded-full font-medium ${trackStatusColor(p.status)}">${esc(p.status)}</span></td>
        <td class="px-3 py-2 text-sm ${!p.owner?'text-red-500 font-semibold':'text-gray-600'}">${p.owner?esc(p.owner):'⚠ Unowned'}</td>
        <td class="px-3 py-2 text-xs text-gray-500">${esc(p.dueDate||'')}</td>
        <td class="px-3 py-2 text-xs text-gray-400">${esc((p.notes||'').slice(0,50))}</td>
        <td class="px-3 py-2 text-xs text-gray-400">${p.updatedAt?new Date(p.updatedAt).toLocaleDateString():''}</td>
        <td class="px-3 py-2 whitespace-nowrap">
          <button onclick="editProject('${p.id}')" class="text-xs text-blue-500 hover:underline mr-2">edit</button>
          <button onclick="deleteProject('${p.id}')" class="text-xs text-red-400 hover:underline">del</button>
        </td>
      </tr>`).join('');
    return `
      <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 mb-3">
        <div class="bg-gray-700 text-white px-4 py-2 text-sm font-bold">${esc(cat)}</div>
        <div class="overflow-x-auto">
          <table class="w-full text-left" style="min-width:560px">
            <thead><tr class="bg-gray-50 text-xs text-gray-500 uppercase">
              <th class="px-3 py-2">Name/Ticket</th><th class="px-3 py-2">Status</th>
              <th class="px-3 py-2">Owner</th><th class="px-3 py-2">Due</th>
              <th class="px-3 py-2">Notes</th><th class="px-3 py-2">Updated</th>
              <th class="px-3 py-2"></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  document.getElementById('tab-content-tracking').innerHTML=`
    <!-- Excel / SharePoint link -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm px-4 py-4 mb-4">
      <div class="flex flex-wrap items-center gap-3">
        <span class="font-bold text-sm text-gray-800">📂 Live Tracking Sheet</span>
        ${sheetUrl
          ? `<a href="${esc(sheetUrl)}" target="_blank"
               class="bg-[#0053e2] text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-[#003eb0] inline-flex items-center gap-2">
               Open Tracking Sheet ↗</a>
             <button onclick="configSheetUrl()" class="text-xs text-gray-400 hover:text-blue-600">change URL</button>`
          : `<button onclick="configSheetUrl()"
               class="bg-[#ffc220] text-gray-900 text-sm font-semibold px-4 py-2 rounded-lg hover:bg-[#e6ae00]">
               + Set Tracking Sheet URL</button>
             <span class="text-xs text-gray-400">Paste your SharePoint / Excel link once and it opens directly from here.</span>`}
      </div>
    </div>
    <!-- Summary cards -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2 mb-4">${summaryCards}</div>
    ${alertHtml}
    ${catSections||`<div class="bg-white rounded-xl p-8 text-center text-gray-400 italic border border-gray-100">No items yet — add your first tracking item below.</div>`}
    <button onclick="openAddProject()"
      class="w-full bg-[#0053e2] text-white rounded-xl py-3 text-sm font-semibold hover:bg-[#003eb0] mt-2">
      + Add Item to Tracking Sheet
    </button>`;
}

function deleteProject(id){
  if(!confirm('Delete this item?')) return;
  const store=getStore(); store.projects=store.projects.filter(x=>x.id!==id);
  save(store); renderTracking();
}

// ── WEEKLY ────────────────────────────────────────────────────────────────────
function renderWeekly(){
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today); monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const store=getStore();

  const days=Array.from({length:5},(_,i)=>{
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    return d.toISOString().slice(0,10);
  });

  const rows=days.map(ds=>{
    const dn=new Date(ds+'T12:00:00');
    const dayName=DAY_NAMES[dn.getDay()];
    const blocks=getBlocks(ds);
    const dayBlocks=store.blocks[ds]||{};
    const workBlocks=blocks.filter(b=>!b.isLunch);
    const total=workBlocks.length;
    const done=workBlocks.filter(b=>(dayBlocks[b.id]||{}).status==='done').length;
    const pct=total?Math.round(done/total*100):0;
    const note=WEEKLY_NOTES[dayName]||'';
    const isToday=ds===isoToday();
    return `
      <div class="bg-white rounded-xl border ${isToday?'border-blue-300 ring-2 ring-blue-200':'border-gray-100'} overflow-hidden shadow-sm">
        <div class="px-4 py-3 flex items-center justify-between ${isToday?'bg-blue-50':'bg-gray-50'}">
          <div class="flex items-center gap-2">
            <span class="font-bold text-gray-900">${dayName}</span>
            <span class="text-xs text-gray-500">${dn.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
            ${isToday?'<span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full font-bold">TODAY</span>':''}
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500">${done}/${total}</span>
            <div class="w-20 h-2 bg-gray-200 rounded-full overflow-hidden">
              <div class="h-full rounded-full ${pct===100?'bg-green-500':'bg-[#0053e2]'}" style="width:${pct}%"></div>
            </div>
            <button onclick="setDate('${ds}');setTab('timeline')"
              class="text-xs text-blue-600 hover:underline ml-1">View →</button>
          </div>
        </div>
        ${note?`<div class="px-4 py-2 text-xs text-amber-700 bg-amber-50 border-t border-amber-100 font-medium">${note}</div>`:''}
      </div>`;
  }).join('');

  const cadence=`
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mt-4">
      <div class="bg-gray-800 text-white px-4 py-2 text-sm font-bold">📅 Fixed Weekly Cadence</div>
      <div class="divide-y divide-gray-50">
        ${[
          ['Tuesday', 'Planning Lock-In — finalize weekly plan, confirm phasing, complete weekly planner, review GC/flooring, finalize Adobe PDFs.'],
          ['Wednesday','Pre-Entry for JSR + Update REXPRT. Make everything clear and accessible.'],
          ['Thursday', '⚠️ JSR DUE BY 9:00 AM — first thing. Follow up on all outstanding issues.'],
          ['Friday',   '⚠️ Weekly Summary DUE BY 9:00 AM — send before anything else. Rest of day: admin, resolve follow-ups, prep for Sunday.'],
        ].map(([d,n])=>`
          <div class="px-4 py-3 flex gap-3 text-sm">
            <span class="font-bold text-gray-700 w-24 shrink-0">${d}</span>
            <span class="text-gray-600">${n}</span>
          </div>`).join('')}
      </div>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mt-3">
      <div class="bg-gray-800 text-white px-4 py-2 text-sm font-bold">📋 Tracking Rules</div>
      <div class="px-4 py-3 text-sm text-gray-700 space-y-1.5">
        <div>• Three lists only: <strong>Today</strong>, <strong>Obstacles</strong>, <strong>Upcoming</strong>. If it doesn't fit, it waits.</div>
        <div>• <strong>Past due</strong> → escalate same day. No exceptions.</div>
        <div>• <strong>24 hours</strong> → follow up. <strong>48 hours</strong> → escalate immediately.</div>
        <div>• Every task in Today must have an owner.</div>
      </div>
    </div>`;

  document.getElementById('tab-content-weekly').innerHTML=`<div class="space-y-2">${rows}</div>${cadence}`;
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function showModal()  { document.getElementById('modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  setDate(isoToday());
  setTab('timeline');
  setInterval(render, 60000);
}
init();
</script>
