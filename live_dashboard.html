tailwind.config = {
  theme: { extend: { colors: {
    wm: '#0053e2', wmhov: '#003eb0',
    spark: '#ffc220', sparkhov: '#e6ae00',
  }}}
};

const KEY = 'rpc_dash_v2';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}
function save(data) { localStorage.setItem(KEY, JSON.stringify(data)); }

function getStore() {
  const d = load();
  if (!d.tasks)     d.tasks     = [];
  if (!d.projects)  d.projects  = [];
  if (!d.picklist)  d.picklist  = [];
  if (!d.walk)      d.walk      = [];
  if (!d.blocks)    d.blocks    = {};   // { "2026-05-05": { blockId: {status, notes} } }
  if (!d.closeout)  d.closeout  = {};   // { "2026-05-05": { checks, notes } }
  return d;
}

function isoToday() { return new Date().toISOString().slice(0,10); }

function getBlocks(dateStr) {
  const dow = new Date(dateStr + 'T12:00:00').getDay(); // 0=Sun,1=Mon...
  const map = { 1:0, 2:1, 3:2, 4:3, 5:4 }; // JS day -> schedule key
  const key = map[dow];
  return SCHEDULE[key] !== undefined ? SCHEDULE[key] : SCHEDULE.default;
}

const WEEKLY_NOTES = {
  'Tuesday':  '📅 Planning Lock-In — finalize the weekly plan and phasing.',
  'Wednesday':'📅 Pre-Entry day — begin JSR pre-entry and update REXPRT.',
  'Thursday': '⚠️ JSR DUE BY 9:00 AM — submit before anything else.',
  'Friday':   '⚠️ Weekly Summary DUE BY 9:00 AM — send before 9.',
};

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const STATUS_COLORS = {
  done:        'bg-green-100 text-green-800',
  'in-progress':'bg-blue-100 text-blue-700',
  pending:     'bg-gray-100 text-gray-600',
  skipped:     'bg-gray-100 text-gray-400',
  blocked:     'bg-red-100 text-red-700',
};

// ════════════════════════════════════════════════════════════════
//  DATE NAVIGATION
// ════════════════════════════════════════════════════════════════
function setDate(d) {
  state.date = d;
  document.getElementById('date-picker').value = d;
  render();
}
function goToday()  { setDate(isoToday()); }
function prevDay()  { const d=new Date(state.date+'T12:00:00'); d.setDate(d.getDate()-1); setDate(d.toISOString().slice(0,10)); }
function nextDay()  { const d=new Date(state.date+'T12:00:00'); d.setDate(d.getDate()+1); setDate(d.toISOString().slice(0,10)); }

// ════════════════════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════════════════════
function setTab(t) {
  state.tab = t;
  ['timeline','tasks','projects','picklist','walk','closeout','weekly'].forEach(id => {
    document.getElementById('tab-'+id).className = 'px-4 py-2 text-sm whitespace-nowrap ' + (id===t ? 'tab-active' : 'tab-inactive');
    document.getElementById('tab-content-'+id).classList.toggle('hidden', id!==t);
  });
  renderTab(t);
}

// ════════════════════════════════════════════════════════════════
//  RENDER ORCHESTRATOR
// ════════════════════════════════════════════════════════════════
function render() {
  const d = new Date(state.date + 'T12:00:00');
  const dayName = DAY_NAMES[d.getDay()];
  const displayDate = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('hdr-date').textContent = displayDate + ' · ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('date-picker').value = state.date;

  const note = WEEKLY_NOTES[dayName] || '';
  document.getElementById('weekly-note-banner').textContent = note;

  const noteCard = document.getElementById('weekly-note-card');
  if (note) {
    noteCard.classList.remove('hidden');
    noteCard.querySelector('div').textContent = note;
  } else {
    noteCard.classList.add('hidden');
  }

  renderNudges(dayName);
  renderBadges();
  renderTab(state.tab);
}

function renderTab(t) {
  if (t==='timeline')  renderTimeline();
  if (t==='tasks')     renderTasks();
  if (t==='projects')  renderProjects();
  if (t==='picklist')  renderPicklist();
  if (t==='walk')      renderWalk();
  if (t==='closeout')  renderCloseout();
  if (t==='weekly')    renderWeekly();
}

// ════════════════════════════════════════════════════════════════
//  NUDGES
// ════════════════════════════════════════════════════════════════
function renderNudges(dayName) {
  const now = new Date();
  const hour = now.getHours() + now.getMinutes()/60;
  const isToday = state.date === isoToday();
  const nudges = [];

  if (!isToday) { document.getElementById('nudge-bar').innerHTML=''; return; }

  const blocks = getBlocks(state.date);
  const store = getStore();
  const dayBlocks = store.blocks[state.date] || {};

  const current = blocks.find(b=>!b.isLunch && b.start<=hour && hour<b.end);
  if (current) {
    const st = (dayBlocks[current.id]||{}).status || 'pending';
    if (st==='pending')     nudges.push({level:'info',    icon:'🕐', text:`You should be on: <strong>${current.label}</strong> (${current.time})`});
    if (st==='in-progress') nudges.push({level:'success', icon:'✅', text:`In progress: <strong>${current.label}</strong> — keep going!`});
  }

  blocks.filter(b=>!b.isLunch && b.end<=hour).forEach(b=>{
    const st = (dayBlocks[b.id]||{}).status || 'pending';
    if (!['done','skipped'].includes(st)) nudges.push({level:'warning',icon:'⚠️',text:`Not marked done: <strong>${b.label}</strong> (${b.time})`});
  });

  if (dayName==='Thursday' && hour>=8.5 && hour<9)
    nudges.push({level:'critical',icon:'🚨',text:'JSR due at 9:00 AM — submit NOW!'});
  if (dayName==='Friday' && hour>=8.5 && hour<9)
    nudges.push({level:'critical',icon:'🚨',text:'Weekly Summary due at 9:00 AM — send NOW!'});

  const tasks = store.tasks.filter(t=>!t.done);
  const crits = tasks.filter(t=>t.critical||t.blocked);
  if (crits.length) nudges.push({level:'critical',icon:'🚨',text:`${crits.length} critical/blocked task${crits.length>1?'s':''} need attention now.`});

  const unowned = tasks.filter(t=>!t.owner && t.list==='today');
  if (unowned.length) nudges.push({level:'warning',icon:'⚠️',text:`${unowned.length} task${unowned.length>1?'s':''} in Today have no owner assigned.`});

  document.getElementById('nudge-bar').innerHTML = nudges.map(n=>
    `<div class="nudge-${n.level} rounded px-3 py-2 text-sm flex items-start gap-2">
       <span>${n.icon}</span><span>${n.text}</span></div>`
  ).join('');
}

function renderBadges() {
  const store = getStore();
  const tasks = store.tasks.filter(t=>!t.done);
  const todayCount = tasks.filter(t=>t.list==='today').length;
  const obsCount   = tasks.filter(t=>t.list==='obstacles').length;
  const upCount    = tasks.filter(t=>t.list==='upcoming').length;
  const critCount  = tasks.filter(t=>t.critical||t.blocked).length;
  const unowned    = tasks.filter(t=>!t.owner&&t.list==='today').length;

  let html = '';
  if (unowned)   html+=`<span class="bg-red-100 text-red-700 border border-red-300 px-2 py-1 rounded-full text-xs font-semibold">🚫 ${unowned} Unowned</span>`;
  if (critCount) html+=`<span class="bg-red-600 text-white px-2 py-1 rounded-full text-xs font-bold">🚨 ${critCount} Critical/Blocked</span>`;
  html+=`<span class="bg-blue-100 text-blue-700 border border-blue-300 px-2 py-1 rounded-full text-xs">📌 Today: ${todayCount} &nbsp;|&nbsp; ⛔ Obstacles: ${obsCount} &nbsp;|&nbsp; 🔜 Upcoming: ${upCount}</span>`;
  document.getElementById('status-badges').innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
//  TIMELINE TAB
// ════════════════════════════════════════════════════════════════
function renderTimeline() {
  const blocks = getBlocks(state.date);
  const store = getStore();
  const dayBlocks = store.blocks[state.date] || {};
  const now = new Date(); const hour = now.getHours()+now.getMinutes()/60;
  const isToday = state.date===isoToday();

  const html = blocks.map(b => {
    if (b.isLunch) return `
      <div class="bg-white rounded-xl border border-gray-100 px-4 py-3 flex items-center gap-3 text-gray-400">
        <span class="text-xl">🍽️</span>
        <span class="text-sm">${b.time} — Lunch</span>
      </div>`;

    const bData = dayBlocks[b.id] || {};
    const status = bData.status || 'pending';
    const notes  = bData.notes  || '';
    const isCurrent = isToday && b.start<=hour && hour<b.end;
    const isPast    = isToday && b.end<=hour;
    const ringClass = isCurrent ? 'ring-2 ring-blue-400' : '';

    const statusOpts = ['pending','in-progress','done','skipped','blocked'].map(s=>
      `<option value="${s}" ${s===status?'selected':''}>${s}</option>`).join('');

    const tasksHtml = (b.tasks||[]).map(t=>`
      <li class="flex items-start gap-2 text-sm text-gray-700">
        <span class="mt-0.5 text-gray-400">•</span>${esc(t)}
      </li>`).join('');

    return `
    <details class="bg-white rounded-xl border ${isCurrent?'border-blue-300':'border-gray-100'} ${ringClass} overflow-hidden" ${isCurrent?'open':''}>
      <summary class="px-4 py-3 flex items-center justify-between gap-3 hover:bg-gray-50">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <span class="text-lg">${isCurrent?'▶️':isPast&&status!=='done'?'⚠️':'🕐'}</span>
          <div class="min-w-0">
            <div class="font-semibold text-sm text-gray-900 truncate">${esc(b.label)}</div>
            <div class="text-xs text-gray-500">${b.time}</div>
          </div>
        </div>
        <span class="text-xs px-2 py-1 rounded-full font-medium shrink-0 ${STATUS_COLORS[status]||'bg-gray-100 text-gray-600'}">${status}</span>
      </summary>
      <div class="border-t border-gray-100 px-4 py-3 space-y-3">
        ${tasksHtml ? `<ul class="space-y-1">${tasksHtml}</ul>` : ''}
        ${b.output ? `<div class="text-xs bg-green-50 border border-green-100 rounded px-3 py-2 text-green-800"><strong>Output:</strong> ${esc(b.output)}</div>` : ''}
        <div class="flex flex-wrap gap-3 items-center">
          <div class="flex items-center gap-2">
            <label class="text-xs font-medium text-gray-600">Status:</label>
            <select onchange="setBlockStatus('${b.id}','status',this.value)"
              class="text-xs border border-gray-200 rounded px-2 py-1 bg-white">
              ${statusOpts}
            </select>
          </div>
        </div>
        <textarea placeholder="Notes for this block…" rows="2"
          onblur="setBlockStatus('${b.id}','notes',this.value)"
          class="w-full text-xs border border-gray-200 rounded px-3 py-2 resize-none focus:border-blue-400"
          >${esc(notes)}</textarea>
      </div>
    </details>`;
  }).join('');

  document.getElementById('tab-content-timeline').innerHTML = `<div class="space-y-2">${html}</div>`;
}

function setBlockStatus(blockId, field, val) {
  const store = getStore();
  if (!store.blocks[state.date]) store.blocks[state.date] = {};
  if (!store.blocks[state.date][blockId]) store.blocks[state.date][blockId] = {};
  store.blocks[state.date][blockId][field] = val;
  save(store);
  renderBadges();
}

// ════════════════════════════════════════════════════════════════
//  TASKS TAB  (Today / Obstacles / Upcoming)
// ════════════════════════════════════════════════════════════════
function renderTasks() {
  const store = getStore();
  const active = store.tasks.filter(t=>!t.done);
  const done   = store.tasks.filter(t=>t.done).slice(-5).reverse();
  const lists  = [
    { id:'today',     label:'📌 Today — Must Do',      color:'bg-[#0053e2]', hint:'Everything that must happen today.' },
    { id:'obstacles', label:'⛔ Obstacles — Escalate',  color:'bg-red-600',   hint:'Blocked items needing escalation.' },
    { id:'upcoming',  label:'🔜 Upcoming',              color:'bg-gray-700',  hint:'Future work — not today.' },
  ];

  const html = lists.map(lst=>{
    const items = active.filter(t=>t.list===lst.id).sort((a,b)=>(b.critical?1:0)-(a.critical?1:0)||(b.blocked?1:0)-(a.blocked?1:0));
    const rows = items.length ? items.map(t=>taskRow(t,lst.id)).join('') :
      `<p class="text-gray-400 italic text-sm py-2">Nothing here.</p>`;
    return `
    <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
      <div class="${lst.color} text-white px-4 py-3 flex items-center justify-between">
        <div>
          <div class="font-bold text-sm">${lst.label} <span class="opacity-70">(${items.length})</span></div>
          <div class="text-xs opacity-70 mt-0.5">${lst.hint}</div>
        </div>
        <button onclick="openAddTask('${lst.id}')"
          class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1.5 rounded-lg">+ Add</button>
      </div>
      <div class="divide-y divide-gray-50 px-2">${rows}</div>
    </div>`;
  }).join('');

  const doneHtml = done.length ? `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mt-4">
      <div class="bg-green-700 text-white px-4 py-2 text-sm font-bold">✅ Recently Completed (last 5)</div>
      <div class="divide-y divide-gray-50 px-2">
        ${done.map(t=>`
          <div class="py-2 px-2 flex items-center gap-2 text-sm text-gray-400">
            <span>✅</span>
            <span class="flex-1 line-through">${esc(t.text)}</span>
            ${t.owner?`<span class="text-xs">👤${esc(t.owner)}</span>`:''}
            <button onclick="uncompleteTask('${t.id}')" class="text-xs text-blue-500 hover:underline">undo</button>
          </div>`).join('')}
      </div>
    </div>` : '';

  document.getElementById('tab-content-tasks').innerHTML = `<div class="space-y-3">${html}</div>${doneHtml}`;
}

function taskRow(t, currentList) {
  const otherLists = ['today','obstacles','upcoming'].filter(l=>l!==currentList);
  const moveOpts = otherLists.map(l=>
    `<button onclick="moveTask('${t.id}','${l}')" class="text-xs text-gray-500 hover:text-blue-600">→ ${l}</button>`
  ).join('');
  return `
  <div class="py-2 px-2 flex items-start gap-2 ${t.done?'opacity-50':''}">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')"
      class="mt-1 h-4 w-4 rounded border-gray-300 text-blue-600 shrink-0 cursor-pointer">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-1.5">
        ${t.critical?'<span class="text-xs bg-red-600 text-white px-1.5 py-0.5 rounded font-bold">🚨 CRITICAL</span>':''}
        ${t.blocked ?'<span class="text-xs bg-orange-100 text-orange-700 border border-orange-300 px-1.5 py-0.5 rounded font-bold">⛔ BLOCKED</span>':''}
        <span class="text-sm ${t.done?'line-through text-gray-400':''}">${esc(t.text)}</span>
      </div>
      <div class="flex flex-wrap items-center gap-2 mt-1">
        ${t.owner?`<span class="text-xs text-gray-500">👤 ${esc(t.owner)}</span>`:
                  `<span class="text-xs text-red-500 font-semibold">⚠ No owner</span>`}
        ${t.notes?`<span class="text-xs text-gray-400 italic">${esc(t.notes.slice(0,60))}</span>`:''}
      </div>
      <div class="flex flex-wrap gap-2 mt-1">
        ${moveOpts}
        <button onclick="editTask('${t.id}')" class="text-xs text-gray-400 hover:text-blue-600">edit</button>
        <button onclick="deleteTask('${t.id}')" class="text-xs text-gray-400 hover:text-red-600">delete</button>
      </div>
    </div>
  </div>`;
}

function openAddTask(list) {
  document.getElementById('modal-content').innerHTML = `
    <div class="px-5 py-4">
      <h3 class="font-bold text-gray-900 mb-4">Add Task → ${list}</h3>
      <div class="space-y-3">
        <input id="t-text" placeholder="Task description *" required
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400">
        <input id="t-owner" placeholder="Owner (name or role)"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400">
        <textarea id="t-notes" placeholder="Notes…" rows="2"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:border-blue-400"></textarea>
        <div class="flex gap-3">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" id="t-critical" class="rounded"> 🚨 Critical
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" id="t-blocked" class="rounded"> ⛔ Blocked
          </label>
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="saveNewTask('${list}')"
            class="flex-1 bg-[#0053e2] text-white rounded-lg py-2 text-sm font-semibold hover:bg-[#003eb0]">
            Add Task
          </button>
          <button onclick="closeModal()"
            class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm hover:bg-gray-200">
            Cancel
          </button>
        </div>
      </div>
    </div>`;
  showModal();
  document.getElementById('t-text').focus();
}

function saveNewTask(list) {
  const text = document.getElementById('t-text').value.trim();
  if (!text) return;
  const store = getStore();
  store.tasks.push({
    id: uid(), list, text,
    owner:    document.getElementById('t-owner').value.trim(),
    notes:    document.getElementById('t-notes').value.trim(),
    critical: document.getElementById('t-critical').checked,
    blocked:  document.getElementById('t-blocked').checked,
    done: false, createdAt: new Date().toISOString(),
  });
  save(store); closeModal(); renderTasks(); renderBadges(); renderNudges();
}

function editTask(id) {
  const store = getStore();
  const t = store.tasks.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('modal-content').innerHTML = `
    <div class="px-5 py-4">
      <h3 class="font-bold text-gray-900 mb-4">Edit Task</h3>
      <div class="space-y-3">
        <input id="et-text" value="${esc(t.text)}"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400">
        <input id="et-owner" value="${esc(t.owner||'')}" placeholder="Owner"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400">
        <textarea id="et-notes" rows="2"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:border-blue-400"
          >${esc(t.notes||'')}</textarea>
        <select id="et-list"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
          ${['today','obstacles','upcoming'].map(l=>`<option value="${l}" ${t.list===l?'selected':''}>${l}</option>`).join('')}
        </select>
        <div class="flex gap-3">
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" id="et-critical" ${t.critical?'checked':''} class="rounded"> 🚨 Critical
          </label>
          <label class="flex items-center gap-1.5 text-sm cursor-pointer">
            <input type="checkbox" id="et-blocked" ${t.blocked?'checked':''} class="rounded"> ⛔ Blocked
          </label>
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="saveEditTask('${id}')"
            class="flex-1 bg-[#0053e2] text-white rounded-lg py-2 text-sm font-semibold hover:bg-[#003eb0]">Save</button>
          <button onclick="closeModal()"
            class="flex-1 bg-gray-100 text-gray-700 rounded-lg py-2 text-sm hover:bg-gray-200">Cancel</button>
        </div>
      </div>
    </div>`;
  showModal();
}

function saveEditTask(id) {
  const store = getStore();
  const t = store.tasks.find(x=>x.id===id);
  if (!t) return;
  t.text     = document.getElementById('et-text').value.trim();
  t.owner    = document.getElementById('et-owner').value.trim();
  t.notes    = document.getElementById('et-notes').value.trim();
  t.list     = document.getElementById('et-list').value;
  t.critical = document.getElementById('et-critical').checked;
  t.blocked  = document.getElementById('et-blocked').checked;
  save(store); closeModal(); renderTasks(); renderBadges(); renderNudges();
}

function toggleTask(id) {
  const store = getStore();
  const t = store.tasks.find(x=>x.id===id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) t.doneAt = new Date().toISOString();
  save(store); renderTasks(); renderBadges(); renderNudges();
}

function uncompleteTask(id) {
  const store = getStore();
  const t = store.tasks.find(x=>x.id===id);
  if (t) { t.done=false; delete t.doneAt; save(store); renderTasks(); renderBadges(); }
}

function moveTask(id, newList) {
  const store = getStore();
  const t = store.tasks.find(x=>x.id===id);
  if (t) { t.list=newList; save(store); renderTasks(); renderBadges(); }
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  const store = getStore();
  store.tasks = store.tasks.filter(x=>x.id!==id);
  save(store); renderTasks(); renderBadges(); renderNudges();
}

// ════════════════════════════════════════════════════════════════
//  PROJECTS TAB
// ════════════════════════════════════════════════════════════════
const PROJ_CATS = ['Fixtures','Signage','Displays','RPS Tickets','SET Tickets','Other'];
const PROJ_STATUSES = ['On Track','In Progress','At Risk','Overdue','Blocked','Complete'];

function renderProjects() {
  const store = getStore();
  const projs  = store.projects;
  const issues = projs.filter(p=>['Overdue','Blocked'].includes(p.status)||!p.owner);

  const alertHtml = issues.length ? `
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4">
      <p class="text-red-700 font-bold text-xs uppercase tracking-wide mb-2">🚨 Needs Attention</p>
      ${issues.map(p=>`<div class="text-sm text-red-700">• ${esc(p.name)} — ${!p.owner?'<strong>NO OWNER</strong>':esc(p.status)}</div>`).join('')}
    </div>` : '';

  const cats = [...new Set(projs.map(p=>p.category))].sort();
  const grouped = cats.map(cat=>{
    const items = projs.filter(p=>p.category===cat);
    const rows = items.map(p=>`
      <tr class="border-b border-gray-50 hover:bg-gray-50">
        <td class="px-3 py-2 text-sm font-medium text-gray-900">${esc(p.name)}</td>
        <td class="px-3 py-2"><span class="text-xs px-2 py-0.5 rounded-full font-medium ${statusBadge(p.status)}">${esc(p.status)}</span></td>
        <td class="px-3 py-2 text-sm ${!p.owner?'text-red-500 font-semibold':'text-gray-600'}">${p.owner?esc(p.owner):'⚠ Unowned'}</td>
        <td class="px-3 py-2 text-xs text-gray-500">${esc(p.dueDate||'')}</td>
        <td class="px-3 py-2 text-xs text-gray-400">${esc((p.notes||'').slice(0,50))}</td>
        <td class="px-3 py-2 text-xs text-gray-400">${p.updatedAt?new Date(p.updatedAt).toLocaleDateString():''}</td>
        <td class="px-3 py-2">
          <button onclick="editProject('${p.id}')" class="text-xs text-blue-500 hover:underline mr-2">edit</button>
          <button onclick="deleteProject('${p.id}')" class="text-xs text-red-400 hover:underline">del</button>
        </td>
      </tr>`).join('');
    return `
      <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 mb-3">
        <div class="bg-gray-700 text-white px-4 py-2 text-sm font-bold">${esc(cat)}</div>
        <div class="overflow-x-auto">
          <table class="w-full text-left" style="min-width:600px">
            <thead><tr class="bg-gray-50 text-xs text-gray-500 uppercase">
              <th class="px-3 py-2">Name</th><th class="px-3 py-2">Status</th>
              <th class="px-3 py-2">Owner</th><th class="px-3 py-2">Due</th>
              <th class="px-3 py-2">Notes</th><th class="px-3 py-2">Updated</th>
              <th class="px-3 py-2"></th>
            </tr></thead>
            <tbody>${rows||`<tr><td colspan="7" class="px-3 py-4 text-sm text-gray-400 italic">No items.</td></tr>`}</tbody>
          </table>
        </div>
      </div>`;
  }).join('') || `<div class="bg-white rounded-xl p-8 text-center text-gray-400 italic border border-gray-100">No projects yet. Add one below.</div>`;

  document.getElementById('tab-content-projects').innerHTML = `
    ${alertHtml}
    ${grouped}
    <button onclick="openAddProject()"
      class="w-full bg-[#0053e2] text-white rounded-xl py-3 text-sm font-semibold hover:bg-[#003eb0] mt-2">
      + Add Project / Ticket
    </button>`;
}

function statusBadge(s) {
  const m = {'On Track':'bg-green-100 text-green-800','Complete':'bg-green-100 text-green-800','In Progress':'bg-blue-100 text-blue-700','At Risk':'bg-amber-100 text-amber-800','Overdue':'bg-red-100 text-red-800','Blocked':'bg-red-100 text-red-800'};
  return m[s]||'bg-gray-100 text-gray-600';
}

function openAddProject() {
  document.getElementById('modal-content').innerHTML = projectForm();
  showModal();
}

function projectForm(p) {
  const isEdit = !!p;
  return `
    <div class="px-5 py-4">
      <h3 class="font-bold text-gray-900 mb-4">${isEdit?'Edit':'Add'} Project / Ticket</h3>
      <div class="space-y-3">
        <input id="pf-name" placeholder="Name / Ticket # *" value="${esc(p?.name||'')}"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400">
        <select id="pf-cat" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
          ${PROJ_CATS.map(c=>`<option ${(p?.category||''===c)?'selected':''}>${c}</option>`).join('')}
        </select>
        <select id="pf-status" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
          ${PROJ_STATUSES.map(s=>`<option ${(p?.status||'On Track')===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <input id="pf-owner" placeholder="Owner *" value="${esc(p?.owner||'')}"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400">

function saveNewProject() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) return;
  const store = getStore();
  store.projects.push({
    id:uid(), name, category:document.getElementById('pf-cat').value,
    status:document.getElementById('pf-status').value,
    owner:document.getElementById('pf-owner').value.trim(),
    dueDate:document.getElementById('pf-due').value,
    notes:document.getElementById('pf-notes').value.trim(),
    updatedAt:new Date().toISOString(),
  });
  save(store); closeModal(); renderProjects();
}

function editProject(id) {
  const store = getStore();
  const p = store.projects.find(x=>x.id===id);
  if (!p) return;
  document.getElementById('modal-content').innerHTML = projectForm(p);
  showModal();

function saveEditProject(id) {
  const store = getStore();
  const p = store.projects.find(x=>x.id===id);
  if (!p) return;
  p.name=document.getElementById('pf-name').value.trim();
  p.category=document.getElementById('pf-cat').value;
  p.status=document.getElementById('pf-status').value;
  p.owner=document.getElementById('pf-owner').value.trim();
  p.dueDate=document.getElementById('pf-due').value;
  p.notes=document.getElementById('pf-notes').value.trim();
  p.updatedAt=new Date().toISOString();
  save(store); closeModal(); renderProjects();
}

function deleteProject(id) {
  if (!confirm('Delete this project?')) return;
  const store = getStore();
  store.projects = store.projects.filter(x=>x.id!==id);
  save(store); renderProjects();
}

function renderPicklist() {
  const store = getStore();
  const picks  = store.picklist;
  const crits  = picks.filter(p=>p.critical||p.qtyOnHand===0);

  const alertHtml = crits.length ? `
    <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4">
      <p class="text-red-700 font-bold text-xs uppercase tracking-wide mb-1">🚨 Critical / Zero On-Hand — Needs Action Now</p>
      ${crits.map(p=>`
        <div class="text-sm text-red-700 flex items-center gap-2">
          • ${esc(p.fixtureName)}
          ${p.qtyOnHand===0?'<span class="text-xs bg-red-600 text-white px-1 rounded font-bold">ZERO ON-HAND</span>':''}
          ${p.backupPlan?`<span class="text-xs text-gray-500">Backup: ${esc(p.backupPlan)}</span>`:'<span class="text-xs text-orange-600 font-semibold">⚠ No backup plan</span>'}
        </div>`).join('')}
    </div>` : '';

  const rows = picks.length ? picks.map(p=>`

  const alertHtml = issues.length ? `
    <div class="bg-amber-50 border border-amber-300 rounded-xl px-4 py-3 mb-4">
      <p class="text-amber-800 font-bold text-xs uppercase tracking-wide mb-1">⚠️ Issues Found — Check These Areas</p>

  const rows = walks.length ? walks.map(w=>`
    <tr class="border-b border-gray-50 hover:bg-gray-50 ${w.fixtureStatus==='Missing'?'bg-red-50':''}">

// ════════════════════════════════════════════════════════════════
const CO_CHECKS = [
  {id:'notes_done',   label:'📝 Notes finalized'},
  {id:'trailer',      label:'🚚 Trailer staged'},
  {id:'followups',    label:'📧 Final follow-ups sent'},
  {id:'tomorrow',     label:'✅ Tomorrow is ready and clear'},
  {id:'picklist_done',label:'📋 Picklist complete'},
];

function getCoData() {
  const store=getStore();
  if (!store.closeout[state.date]) store.closeout[state.date]={checks:{},notes:''};
  return store.closeout[state.date];
}

function saveCoData(co) {
  const store=getStore();
  store.closeout[state.date]=co;
  save(store);
}

function renderCloseout() {
  const co=getCoData();
  const doneCount=CO_CHECKS.filter(c=>co.checks[c.id]).length;
  const allDone=doneCount===CO_CHECKS.length;
  const pct=Math.round(doneCount/CO_CHECKS.length*100);

  const checkHtml=CO_CHECKS.map(c=>`
    <div class="flex items-center gap-3 py-3 border-b border-gray-50 cursor-pointer hover:bg-gray-50 px-2 rounded"
         onclick="toggleCo('${c.id}')">
      <div class="w-6 h-6 rounded-full flex items-center justify-center shrink-0
                  ${co.checks[c.id]?'bg-green-500':'border-2 border-gray-300'}">
        ${co.checks[c.id]?'<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
      </div>
      <span class="text-sm ${co.checks[c.id]?'line-through text-gray-400':'text-gray-800 font-medium'}">${c.label}</span>
    </div>`).join('');

  document.getElementById('tab-content-closeout').innerHTML = `
    <div class="max-w-xl mx-auto space-y-4">
      <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
        <div class="bg-gray-800 text-white px-4 py-3 flex items-center justify-between">
          <span class="font-bold">🔒 Closeout — ${state.date}</span>
          <span class="text-sm font-semibold ${allDone?'text-green-400':'text-yellow-300'}">${doneCount}/${CO_CHECKS.length} Done</span>
        </div>
        <div class="px-2">
          ${checkHtml}
        </div>
        <div class="px-4 pb-2">
          <div class="h-2 bg-gray-100 rounded-full mt-3 mb-1 overflow-hidden">
            <div class="h-full rounded-full transition-all ${allDone?'bg-green-500':'bg-blue-500'}" style="width:${pct}%"></div>
          </div>
          <p class="text-xs text-gray-500 text-right">${pct}% complete</p>
        </div>
      </div>
      <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
        <div class="bg-gray-700 text-white px-4 py-2 text-sm font-bold">📝 Closeout Notes (for overnight crew)</div>
        <div class="p-4">
          <textarea id="co-notes" placeholder="Write notes for the overnight crew, known issues, instructions…" rows="5"
            onblur="saveCoNotes(this.value)"
            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 resize-none focus:border-blue-400"
            >${esc(co.notes||'')}</textarea>
        </div>
      </div>
      ${allDone?`<div class="bg-green-50 border border-green-200 rounded-xl px-4 py-4 text-center">
        <div class="text-3xl mb-2">✅</div>
        <div class="font-bold text-green-800">Closeout Complete!</div>
        <div class="text-sm text-green-600 mt-1">Clean handoff. Good work today.</div>
      </div>`:''}
    </div>`;
}

function toggleCo(checkId) {
  const co=getCoData();
  co.checks[checkId]=!co.checks[checkId];
  saveCoData(co); renderCloseout();
}

function saveCoNotes(val) {
  const co=getCoData();
  co.notes=val;
  saveCoData(co);
}

//  WEEKLY TAB
// ════════════════════════════════════════════════════════════════
function renderWeekly() {
  const today=new Date();
  const dow=today.getDay();
  const monday=new Date(today); monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const store=getStore();

  const days=Array.from({length:5},(_,i)=>{
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    return d.toISOString().slice(0,10);
  });

  const rows=days.map(ds=>{
    const dn=new Date(ds+'T12:00:00');
    const dayName=DAY_NAMES[dn.getDay()];
    const blocks=getBlocks(ds);
    const dayBlocks=store.blocks[ds]||{};
    const total=blocks.filter(b=>!b.isLunch).length;
    const done=blocks.filter(b=>!b.isLunch&&(dayBlocks[b.id]||{}).status==='done').length;
    const pct=total?Math.round(done/total*100):0;
    const note=WEEKLY_NOTES[dayName]||'';
    const isToday=ds===isoToday();

    return `
      <div class="bg-white rounded-xl border ${isToday?'border-blue-300 ring-2 ring-blue-200':'border-gray-100'} overflow-hidden shadow-sm">
        <div class="px-4 py-3 flex items-center justify-between ${isToday?'bg-blue-50':'bg-gray-50'}">
          <div>
            <span class="font-bold text-gray-900">${dayName}</span>
            <span class="text-xs text-gray-500 ml-2">${new Date(ds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
            ${isToday?'<span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full ml-2 font-bold">TODAY</span>':''}
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500">${done}/${total}</span>
            <div class="w-20 h-2 bg-gray-200 rounded-full overflow-hidden">
              <div class="h-full rounded-full ${pct===100?'bg-green-500':'bg-blue-500'}" style="width:${pct}%"></div>
            </div>
            <button onclick="setDate('${ds}');setTab('timeline')"
              class="text-xs text-blue-600 hover:underline">View →</button>
          </div>
        </div>
        ${note?`<div class="px-4 py-2 text-xs text-amber-700 bg-amber-50 border-t border-amber-100 font-medium">${note}</div>`:''}
      </div>`;
  }).join('');

  const cadence=`
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mt-4">
      <div class="bg-gray-800 text-white px-4 py-2 text-sm font-bold">📅 Fixed Weekly Cadence</div>
      <div class="divide-y divide-gray-50">
        ${[
          ['Tuesday', '📋 Planning Lock-In — finalize weekly plan, confirm phasing, complete weekly planner, review GC/flooring, finalize Adobe PDFs.'],
          ['Wednesday','🔧 Pre-Entry for JSR + Update REXPRT. Make everything clear and accessible.'],
          ['Thursday', '⚠️ JSR DUE BY 9:00 AM. Follow up on all outstanding issues and risks.'],
          ['Friday',   '⚠️ Weekly Summary DUE BY 9:00 AM. Covers progress, risks, key updates. Rest of day: admin, resolve follow-ups, prep notes for Sunday.'],
        ].map(([d,n])=>`
          <div class="px-4 py-3 flex gap-3 text-sm">
            <span class="font-bold text-gray-700 w-24 shrink-0">${d}</span>
            <span class="text-gray-600">${n}</span>
          </div>`).join('')}
      </div>
    </div>`;

  const trackingRules=`
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden mt-4">
      <div class="bg-gray-800 text-white px-4 py-2 text-sm font-bold">📋 Tracking Rules</div>
      <div class="px-4 py-3 text-sm text-gray-700 space-y-2">
        <div>• Keep only <strong>3 lists</strong>: Today, Obstacles, Upcoming.</div>
        <div>• <strong>Past due</strong> → escalate same day.</div>
        <div>• <strong>24 hours</strong> without resolution → follow up.</div>
        <div>• <strong>48 hours</strong> → escalate immediately, no exceptions.</div>
        <div>• If it doesn't fit a list, it waits.</div>
      </div>
    </div>`;

  document.getElementById('tab-content-weekly').innerHTML = `<div class="space-y-2">${rows}</div>${cadence}${trackingRules}`;
}

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
